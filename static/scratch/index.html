<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>scratch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Light mode (default) */
    :root {
      --bg-base: #edf2f6;
      --bg-surface: #ffffff;
      --bg-elevated: #f8f9fa;
      --bg-toc: #ffffff;
      --bg-toc-hover: #ffffff;
      --bg-toc-active: #f8f9fa;
      --text-primary: #18212b;
      --text-secondary: #5a6570;
      --text-muted: #7a8590;
      --text-toc: #18212b;
      --text-toc-muted: #5a6570;
      --toc-border: #d8dee5;
      --toc-overlay: rgba(0, 0, 0, 0.03);
      --toc-overlay-hover: rgba(0, 0, 0, 0.05);
      --toc-overlay-border: rgba(0, 0, 0, 0.1);
      --toc-shadow: rgba(24, 33, 43, 0.08);
      --toc-scrollbar: rgba(0, 0, 0, 0.15);
      --toc-scrollbar-hover: rgba(0, 0, 0, 0.25);
      --accent: #18212b;
      --accent-soft: #ffffff;
      --accent-hover: #18212b;
      --border: #d8dee5;
      --border-strong: #aeb8c3;
      --box-bg: var(--bg-surface);
      --box-border: 1px solid #000000;
      --box-padding: 1rem 1.25rem;
      --box-padding-y: 1rem;
      --box-padding-x: 1.25rem;
      --box-margin: 1.5rem 0;
      --thm-blue-bg: #f1faff;
      --thm-definition-bg: #ffffd3;
      --thm-example-bg: #F5FFF4;
      --thm-idea-bg: #fef6ff;
      
      /* Content accents (override as desired) */
      --proof-guide-color: var(--text-primary); /* black in light mode */
      --proof-highlight-bg: rgba(130, 80, 223, 0.06);
      --proof-highlight-border: rgba(130, 80, 223, 0.45);
      --list-marker-color: var(--text-primary); /* black in light mode */
      --code-bg: #eef2f5;
      --code-pre-bg: #f7f7f7;
      --code-pre-text: #18212b;
      --syntax-keyword: #cf222e;
      --syntax-function: #8250df;
      --syntax-string: #0a3069;
      --syntax-number: #0550ae;
      --syntax-comment: #6e7781;
      --shadow-sm: none;
      --shadow-md: none;
      --math-color: #18212b;
      
      /* Customizable reading settings */
      --content-font: 'DM Sans', system-ui, sans-serif;
      --content-font-size: 1.05rem;
      --content-line-height: 1.56;
      --content-max-width: 860px;
      --responsive-content-max-width: 720px;
      --sidebar-width: 240px;
      --sidebar-gap: 28px;
      --desktop-layout-max-width: calc(var(--sidebar-width) + var(--sidebar-gap) + var(--content-max-width));

      /* Typst HTML export spacing tokens */
      --typst-paragraph-margin-top: 0rem;
      --typst-paragraph-margin-bottom: 1.25rem;
      --typst-paragraph-before-tight-list-margin-bottom: 0.25rem;
      --typst-paragraph-before-list-margin-bottom: 0.25rem;
      --typst-paragraph-plus-tight-list-margin-top: 0.25rem;

      --typst-heading-scroll-margin-top: 24px;
      --typst-h1-margin-top: 0rem;
      --typst-h1-margin-bottom: 1rem;
      --typst-h1-padding-bottom: 0.9rem;
      --typst-h1-border-bottom-width: 1px;

      --typst-h2-margin-top: 3.75rem;
      --typst-h2-margin-bottom: 0.75rem;
      --typst-h2-margin-bottom-before-h3: 0rem;
      --typst-h2-section-end-gap: 3rem;

      --typst-h3-margin-top: 2.5rem;
      --typst-h3-margin-bottom: 0.5rem;
      --typst-h3-margin-top-after-h2: 1rem;

      --typst-h4-margin-top: 1.25rem;
      --typst-h4-margin-bottom: 0.5rem;

      --typst-list-indent: 1.75rem;
      --typst-list-margin-top: 1rem;
      --typst-list-margin-bottom: 1.5rem;
      --typst-list-tight-margin-top: 0.5rem;
      --typst-list-tight-margin-bottom: var(--typst-list-margin-bottom);

      --typst-list-tight-item-gap: 0.15rem;
      --typst-list-nontight-item-gap: 0.75rem;

      --typst-li-margin-bottom: 0.5rem;
      --typst-li-padding-left: 0.5rem;
      --typst-li-paragraph-margin-top: 0rem;
      --typst-li-paragraph-margin-bottom: 0.15rem;

      --typst-nested-list-margin-top: 0.1rem;
      --typst-nested-list-nontight-margin-top: 0.75rem;
      --typst-nested-list-after-blankline-margin-top: 0.75rem;

      --typst-list-last-in-container-margin-bottom: 0.25rem;

      /* Block equation vertical spacing (controls p ↔ equation ↔ p gaps via margin collapsing) */
      --typst-block-math-margin-y: 1.5rem;
      --typst-block-math-scroll-margin-top: var(--typst-heading-scroll-margin-top);

      /* Images / figures */ 
      --typst-image-margin-top: 1.5rem;
      --typst-image-margin-bottom: 1.5rem;
      --typst-figure-margin-top: 1.5rem;
      --typst-figure-margin-bottom: 1.5rem;
      --typst-figcaption-margin-top: 0.5rem;
    }

    /* Dark mode - GitHub dark dimmed style */
    [data-theme="dark"] {
      --bg-base: #1E1E1E;
      --bg-surface: #252932;
      --bg-elevated: #2f3440;
      --bg-toc: #2F343F;
      --bg-toc-hover: #252932;
      --bg-toc-active: #2f3440;
      --text-primary: #e1e8ed;
      --text-secondary: #b1bac4;
      --text-muted: #768390;
      --text-toc: #e1e8ed;
      --text-toc-muted: #9ca5b0;
      --toc-border: rgba(255, 255, 255, 0.12);
      --toc-overlay: rgba(255, 255, 255, 0.05);
      --toc-overlay-hover: rgba(255, 255, 255, 0.12);
      --toc-overlay-border: rgba(255, 255, 255, 0.2);
      --toc-shadow: rgba(0, 0, 0, 0.3);
      --toc-scrollbar: rgba(255, 255, 255, 0.2);
      --toc-scrollbar-hover: rgba(255, 255, 255, 0.3);
      --accent: #e07850;
      --accent-soft: rgba(224, 120, 80, 0.2);
      --accent-hover: #f08860;
      --proof-highlight-bg: rgba(210, 168, 255, 0.08);
      --proof-highlight-border: rgba(210, 168, 255, 0.5);
      --border: rgba(225, 232, 237, 0.15);
      --border-strong: rgba(225, 232, 237, 0.3);
      --box-border: 1px solid rgba(225, 232, 237, 0.34);
      --thm-blue-bg: #20303a;
      --thm-definition-bg: #39331f;
      --thm-example-bg: #203528;
      --thm-idea-bg: #362739;
      --code-bg: #414957;
      --code-pre-bg: #1e1e1e;
      --code-pre-text: #e1e8ed;
      --syntax-keyword: #ff7b72;
      --syntax-function: #d2a8ff;
      --syntax-string: #a5d6ff;
      --syntax-number: #79c0ff;
      --syntax-comment: #8b949e;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
      --math-color: #e1e8ed;
    }

    /* System preference detection - GitHub dark dimmed style */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg-base: #1E1E1E;
        --bg-surface: #252932;
        --bg-elevated: #2f3440;
        --bg-toc: #23272D;
        --bg-toc-hover: #252932;
        --bg-toc-active: #2f3440;
        --text-primary: #e1e8ed;
        --text-secondary: #b1bac4;
        --text-muted: #768390;
        --text-toc: #e1e8ed;
        --text-toc-muted: #9ca5b0;
        --toc-border: rgba(255, 255, 255, 0.12);
        --toc-overlay: rgba(255, 255, 255, 0.05);
        --toc-overlay-hover: rgba(255, 255, 255, 0.12);
        --toc-overlay-border: rgba(255, 255, 255, 0.2);
        --accent: #e07850;
        --accent-soft: rgba(224, 120, 80, 0.2);
        --accent-hover: #f08860;
        --proof-highlight-bg: rgba(210, 168, 255, 0.08);
        --proof-highlight-border: rgba(210, 168, 255, 0.5);
        --border: rgba(225, 232, 237, 0.15);
        --border-strong: rgba(225, 232, 237, 0.3);
        --box-border: 1px solid rgba(225, 232, 237, 0.34);
        --thm-blue-bg: #20303a;
        --thm-definition-bg: #39331f;
        --thm-example-bg: #203528;
        --thm-idea-bg: #362739;
        --code-bg: #414957;
        --code-pre-bg: #1e1e1e;
        --code-pre-text: #e1e8ed;
        --syntax-keyword: #ff7b72;
        --syntax-function: #d2a8ff;
        --syntax-string: #a5d6ff;
        --syntax-number: #79c0ff;
        --syntax-comment: #8b949e;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
        --math-color: #e1e8ed;
        img {
            filter: brightness(0.6);
        }
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: block;
    }

    /* Hide TOC list until it's built to prevent flicker */
    .toc-list {
      opacity: 0;
      transition: none;
    }

    .toc-list.ready {
      opacity: 1;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0,0,0,0.25);
    }

    .toc::-webkit-scrollbar-thumb {
      background: var(--toc-scrollbar);
    }

    .toc::-webkit-scrollbar-thumb:hover {
      background: var(--toc-scrollbar-hover);
    }

    /* Layout */
    .reader {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, var(--content-max-width));
      gap: var(--sidebar-gap);
      width: min(var(--desktop-layout-max-width), calc(100% - 36px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px 18px 46px;
      align-items: start;
      position: relative;
    }

    /* Table of Contents - Floating Sidebar */
    .toc {
      position: sticky;
      top: 26px;
      width: 100%;
      max-height: calc(100vh - 36px);
      background: var(--bg-toc);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 100;
      border: 1px solid var(--toc-border);
      box-shadow: none;
    }

    .toc-header {
      padding: 16px 14px 14px;
      border-bottom: 1px solid var(--toc-border);
    }

    .toc-title-block {
      flex: 1;
      min-width: 0;
    }

    .toc-title {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-toc);
      line-height: 1.3;
      letter-spacing: 0;
      margin: 0;
    }

    .toc-term {
      display: block;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-toc-muted);
      margin-top: 12px;
    }

    .toc-term:empty {
      display: none;
    }

    .toc-instructor {
      display: block;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-toc-muted);
      margin-top: 2px;
    }

    .toc-instructor:empty {
      display: none;
    }

    .section-jump {
      display: none;
      border-bottom: 1px solid var(--toc-border);
      background: var(--bg-toc);
      padding: 10px 14px;
    }

    .section-jump.open {
      display: block;
    }

    .section-jump-input {
      width: 100%;
      border: 1px solid var(--toc-border);
      background: var(--bg-surface);
      color: var(--text-primary);
      font: inherit;
      font-size: 0.82rem;
      outline: none;
      padding: 7px 8px;
    }

    .section-jump-input:focus {
      border-color: var(--border-strong);
    }

    .section-jump-status {
      display: block;
      min-height: 1rem;
      color: var(--text-toc-muted);
      font-size: 0.72rem;
      margin-top: 6px;
    }

    .settings-toggle {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 0;
      border: 1px solid var(--toc-border);
      background: var(--bg-toc);
      color: var(--text-toc-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: none;
    }

    .settings-toggle:hover,
    .settings-toggle.active {
      background: var(--bg-toc-active);
      color: var(--text-toc);
      border-color: var(--toc-border);
    }

    .settings-toggle svg {
      transition: none;
    }

    .settings-toggle.active svg {
      transform: rotate(90deg);
    }

    /* Settings Panel */
    .settings-panel {
      background: var(--bg-toc);
      border-bottom: 1px solid var(--toc-border);
      margin-left: -14px;
      margin-right: -14px;
      margin-bottom: 16px;
      padding: 0 14px;
      max-height: 0;
      overflow: hidden;
      transition: none;
    }

    .settings-panel.open {
      max-height: 400px;
      padding: 14px;
      margin-bottom: 16px;
    }
    
    .settings-panel:not(.open) {
      margin-bottom: 0;
      border-bottom: none;
    }

    .settings-section {
      margin-bottom: 20px;
    }

    .settings-section:last-child {
      margin-bottom: 0;
    }

    .settings-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      color: var(--text-toc-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      display: block;
    }

    .settings-options {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .settings-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      padding: 8px 12px;
      border-radius: 0;
      border: 1px solid var(--toc-border);
      background: var(--bg-toc);
      color: var(--text-toc-muted);
      cursor: pointer;
      transition: none;
      white-space: nowrap;
    }

    .settings-btn:hover {
      background: var(--bg-toc-active);
      color: var(--text-toc);
      border-color: var(--toc-border);
    }

    .settings-btn.active {
      background: var(--bg-toc-active);
      color: var(--text-toc);
      border-color: var(--toc-border);
    }

    .settings-btn .icon {
      display: inline-block;
      margin-right: 4px;
      font-size: 0.85em;
    }

    .toc-nav {
      flex: 1;
      overflow-y: auto;
      padding: 0px 0 16px;
      /* Prevent scroll from leaking to parent when at top/bottom */
      overscroll-behavior: contain;
      /* Hide scrollbar while keeping scroll functionality */
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE/Edge */
    }

    .toc-nav::-webkit-scrollbar {
      display: none; /* Chrome/Safari/Opera */
    }

    .toc-list {
      list-style: none;
    }

    .toc-item {
      position: relative;
    }

    .toc-link {
      display: flex;
      align-items: baseline;
      padding: 5px 14px;
      color: var(--text-toc-muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 400;
      transition: none;
      position: relative;
      gap: 4px;
    }

    .toc-link[data-level="1"] {
      font-weight: 600;
      color: var(--text-toc);
      /* padding-top: 8px; */
      /* padding-bottom: 5px; */
    }

    .toc-link[data-level="2"] {
      font-weight: 600;
      color: var(--text-toc);
      /* padding-top: 8px; */
      /* padding-bottom: 5px; */
      font-size: 0.875rem;
    }

    .toc-link::before {
      content: none;
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: none;
    }

    .toc-link:hover {
      color: var(--text-toc);
      background: var(--bg-toc-hover);
    }

    .toc-link.active {
      color: var(--text-toc);
      background: var(--bg-toc-active);
    }

    .toc-link.section-jump-match {
      color: var(--text-toc);
      background: var(--accent-soft);
      outline: 1px solid var(--border-strong);
      outline-offset: -1px;
    }

    .toc-link.sidebar-keyboard-marker {
      color: var(--text-toc);
      background: var(--accent-soft);
      outline: 1px solid var(--accent);
      outline-offset: -1px;
    }

    .toc-number {
      font-size: inherit;
      color: inherit;
      min-width: auto;
    }

    .toc-text {
      flex: 1;
      white-space: normal;
      word-wrap: break-word;
    }

    .toc-link[data-level="3"] {
      padding-left: 20px;
      font-size: 0.8rem;
    }

    .toc-footer {
      padding: 14px;
      border-top: 1px solid var(--toc-border);
    }

    .toc-footer .settings-toggle {
      width: 36px;
      height: 36px;
    }

    .toc-mobile-toggle {
      display: none;
      width: 40px;
      height: 40px;
      border-radius: 0;
      border: 1px solid var(--toc-border);
      background: var(--bg-toc);
      color: var(--text-toc);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .toc-mobile-toggle:hover {
      background: var(--bg-toc-active);
    }

    /* Main Content */
    .main {
      min-width: 0;
      min-height: auto;
      display: block;
    }

    .content-wrapper {
      width: 100%;
      max-width: var(--content-max-width);
      margin: 0;
      padding: 42px 52px 72px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      transition: none;
    }

    /* Typst Content Styling */
    .typst-content {
      font-family: var(--content-font);
      font-size: var(--content-font-size);
      line-height: var(--content-line-height);
      color: var(--text-primary);
      transition: none;
    }

    /* Reset Typst's default styling while keeping structure */
    .typst-content * {
      max-width: 100%;
    }

    /* NOTE typst headings start at h2 so this is irrelevant */
    .typst-content h1 {
      font-family: var(--content-font);
      font-size: 10rem;
      font-weight: 650;
      color: var(--text-primary);
      margin-top: var(--typst-h1-margin-top);
      margin-bottom: var(--typst-h1-margin-bottom);
      line-height: 1.12;
      letter-spacing: 0;
      padding-bottom: var(--typst-h1-padding-bottom);
      border-bottom: var(--typst-h1-border-bottom-width) solid var(--border-strong);
      scroll-margin-top: var(--typst-heading-scroll-margin-top);
    }

    .typst-content h2 {
      font-family: var(--content-font);
      font-size: 1.75rem;
      font-weight: 650;
      color: var(--text-primary);
      margin-top: var(--typst-h2-margin-top);
      margin-bottom: var(--typst-h2-margin-bottom);
      line-height: 1.25;
      letter-spacing: 0;
      scroll-margin-top: var(--typst-heading-scroll-margin-top);
      position: relative;
    }

    /* Reduce h2 bottom spacing when an h3 immediately follows. */
    .typst-content h2:has(+ h3) {
      margin-bottom: var(--typst-h2-margin-bottom-before-h3);
    }

    .typst-content h3 {
      font-family: var(--content-font);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: var(--typst-h3-margin-top);
      margin-bottom: var(--typst-h3-margin-bottom);
      scroll-margin-top: var(--typst-heading-scroll-margin-top);
    }

    /* Fallback for browsers without :has(): remove the h3 top margin instead. */
    .typst-content h2 + h3 {
      margin-top: var(--typst-h3-margin-top-after-h2);
    }

    .typst-content h4 {
      font-family: var(--content-font);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: var(--typst-h4-margin-top);
      margin-bottom: var(--typst-h4-margin-bottom);
      scroll-margin-top: var(--typst-heading-scroll-margin-top);
    }

    /* Heading numbers */
    .typst-content .heading-number {
      color: var(--accent);
      font-weight: 500;
      margin-right: 0.15em;
    }

    .typst-content p {
      margin-top: var(--typst-paragraph-margin-top);
      margin-bottom: var(--typst-paragraph-margin-bottom);
    }

    /* Paragraph directly before a list: reduce the paragraph→list gap.
       (Margins between consecutive blocks collapse, so we must reduce BOTH
       the paragraph bottom margin and the list top margin in this case.) */
    .typst-content p:has(+ ul.list-tight),
    .typst-content p:has(+ ol.list-tight) {
      margin-bottom: var(--typst-paragraph-before-tight-list-margin-bottom);
    }

    .typst-content p:has(+ ul.list-nontight),
    .typst-content p:has(+ ol.list-nontight),
    .typst-content p:has(+ ul:not(.list-tight):not(.list-nontight)),
    .typst-content p:has(+ ol:not(.list-tight):not(.list-nontight)) {
      margin-bottom: var(--typst-paragraph-before-list-margin-bottom);
    }

    /* Paragraph ↔ block equation spacing is controlled by `.block-math` margins. */

    .typst-content strong, .typst-content b {
      font-weight: 600;
      color: var(--text-primary);
    }

    .typst-content em, .typst-content i {
      font-style: italic;
    }

    .typst-content a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
      border-bottom: 0;
      transition: none;
    }

    .typst-content a:hover {
      color: var(--accent);
    }

    .typst-content code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85em;
      background: var(--code-bg);
      padding: 0.12em 0.3em;
      margin: 0 0.08em;
      border-radius: 3px;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .typst-content pre {
      background: var(--code-pre-bg);
      border: 0;
      border-radius: 0;
      padding: 0.65rem 0.8rem;
      margin: 1rem 0;
      overflow-x: auto;
      box-shadow: none;
      position: relative;
    }

    .typst-content pre code {
      background: none;
      padding: 0;
      margin: 0;
      color: var(--code-pre-text);
      font-size: 0.85rem;
      line-height: 1.25;
      display: block;
      white-space: pre;
      overflow-wrap: normal;
      tab-size: 4;
    }

    .typst-content pre code span {
      white-space: inherit;
    }

    .code-copy-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.72rem;
      line-height: 1;
      opacity: 0;
      padding: 5px 7px;
      pointer-events: none;
      transition: none;
    }

    .typst-content pre:hover .code-copy-btn,
    .typst-content pre:focus-within .code-copy-btn {
      opacity: 1;
      pointer-events: auto;
    }

    .code-copy-btn:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .typst-content pre code span[style*="#d73948"] {
      color: var(--syntax-keyword) !important;
    }

    .typst-content pre code span[style*="#4b69c6"] {
      color: var(--syntax-function) !important;
    }

    .typst-content pre code span[style*="#198810"] {
      color: var(--syntax-string) !important;
    }

    .typst-content pre code span[style*="#b60157"] {
      color: var(--syntax-number) !important;
    }

    .typst-content pre code span[style*="#74747c"] {
      color: var(--syntax-comment) !important;
    }

    .typst-content ul, .typst-content ol {
      margin: var(--typst-list-margin-top) 0 var(--typst-list-margin-bottom) var(--typst-list-indent);
    }

    /* Tight lists: minimal spacing between items (Typst default) */
    .typst-content ul.list-tight,
    .typst-content ol.list-tight {
      /* Use the same bottom margin as nontight lists */
      margin: var(--typst-list-tight-margin-top) 0 var(--typst-list-tight-margin-bottom) var(--typst-list-indent);
    }

    /* If a paragraph is immediately followed by a tight list, tighten list top margin too. */
    .typst-content p + ul.list-tight,
    .typst-content p + ol.list-tight {
      margin-top: var(--typst-paragraph-plus-tight-list-margin-top);
    }

    /* Item spacing should not add extra space after the list.
       Apply the gap only between items, not after the last one. */
    .typst-content ul.list-tight > li:not(:last-child),
    .typst-content ol.list-tight > li:not(:last-child) {
      margin-bottom: var(--typst-list-tight-item-gap);
    }

    .typst-content ul.list-tight > li:last-child,
    .typst-content ol.list-tight > li:last-child {
      margin-bottom: 0;
    }

    


    /* Nontight lists: more spacing between items (tight: false) */
    .typst-content ul.list-nontight,
    .typst-content ol.list-nontight {
      margin: var(--typst-list-margin-top) 0 var(--typst-list-margin-bottom) var(--typst-list-indent);
    }

    .typst-content ul.list-nontight > li:not(:last-child),
    .typst-content ol.list-nontight > li:not(:last-child) {
      margin-bottom: var(--typst-list-nontight-item-gap);
    }

    .typst-content ul.list-nontight > li:last-child,
    .typst-content ol.list-nontight > li:last-child {
      margin-bottom: 0;
    }

    /* List items often contain paragraphs in Typst HTML export.
       Remove the global paragraph bottom margin inside list items to avoid
       a huge gap between a parent bullet and its nested list. */
    .typst-content ul > li > p,
    .typst-content ol > li > p {
      margin-top: var(--typst-li-paragraph-margin-top);
      margin-bottom: var(--typst-li-paragraph-margin-bottom);
    }

    .typst-content ul > li > p:last-child,
    .typst-content ol > li > p:last-child {
      margin-bottom: 0;
    }

    /* Nested lists: tight spacing by default (parent -> child should be tight) */
    .typst-content li > ul.list-tight,
    .typst-content li > ol.list-tight {
      margin-top: var(--typst-nested-list-margin-top);
      margin-bottom: 0;
    }

    .typst-content li > ul.list-nontight,
    .typst-content li > ol.list-nontight {
      margin-top: var(--typst-nested-list-nontight-margin-top);
      margin-bottom: 0;
    }

    /* If a list item contains an extra paragraph block before the nested list
       (common outcome of an explicit blank line), allow a larger gap. */
    .typst-content li > p + p + ul.list-tight,
    .typst-content li > p + p + ul.list-nontight,
    .typst-content li > p + p + ol.list-tight,
    .typst-content li > p + p + ol.list-nontight {
      margin-top: var(--typst-nested-list-after-blankline-margin-top);
    }

    .typst-content li {
      margin-bottom: var(--typst-li-margin-bottom);
      padding-left: var(--typst-li-padding-left);
    }

    .typst-content li::marker {
      color: var(--list-marker-color);
    }

    /* Remove trailing list margin when it is the last element in a section
       (i.e. immediately before the next heading) or at the end of content. */
    .typst-content > ul:has(+ h2),
    .typst-content > ul:has(+ h3),
    .typst-content > ul:has(+ h4),
    .typst-content > ol:has(+ h2),
    .typst-content > ol:has(+ h3),
    .typst-content > ol:has(+ h4),
    .typst-content > ul:last-child,
    .typst-content > ol:last-child {
      margin-bottom: var(--typst-list-last-in-container-margin-bottom);
    }

    .typst-content blockquote {
      border: var(--box-border);
      padding: var(--box-padding);
      margin: var(--box-margin);
      background: var(--box-bg);
      border-radius: 0;
    }

    .typst-content blockquote p {
      margin-bottom: 0;
      font-style: normal;
      color: var(--text-primary);
    }

    .typst-content hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 3rem 0;
    }

    .typst-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.75rem 0;
      font-size: 0.95rem;
    }

    .typst-content th, .typst-content td {
      padding: 9px 10px;
      text-align: left;
      border: 1px solid var(--border);
    }

    .typst-content th {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .typst-content tr:hover td {
      background: transparent;
    }

    /* Math styling - Typst renders math as SVG */
    .typst-content svg.typst-frame {
      vertical-align: 0.0em;
      display: inline-block;
    }

    /* Inline math wrapper spans - vertical-align set by JS for tall elements */

    /* Thicken math glyphs slightly to match PDF appearance */
    .typst-content svg.typst-frame use {
      stroke: var(--math-color);
      stroke-width: 0.2px; /* Wtf this fixed it? */
      paint-order: stroke fill;
    }

    /* Block math centering with equation numbers */
    .typst-content .block-math {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: var(--typst-block-math-margin-y) 0;
      width: 100%;
      position: relative;
      scroll-margin-top: var(--typst-block-math-scroll-margin-top);
    }
    .typst-content .block-math .eq-content {
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .typst-content .block-math .eq-number {
      position: absolute;
      right: 0;
      color: var(--math-color);
      font-family: var(--content-font);
      font-size: var(--content-font-size);
    }

    /* Legacy: direct SVG children (for backward compatibility) */
    .typst-content p > svg.typst-frame:only-child,
    .typst-content > svg.typst-frame {
      display: block;
      margin: 1.5rem auto;
    }

    /* Fix math colors - adapt to theme */
    .typst-content svg.typst-frame [fill="#000000"],
    .typst-content svg.typst-frame use,
    .typst-content svg.typst-frame g {
      fill: var(--math-color) !important;
    }

    .typst-content svg.typst-frame [stroke="#000000"] {
      stroke: var(--math-color) !important;
    }

    .typst-content svg.typst-frame path {
      fill: var(--math-color) !important;
    }

    /* Images */
    .typst-content img {
      max-width: 100%;
      height: auto;
      border: 0;
      border-radius: 0;
      margin: var(--typst-image-margin-top) auto var(--typst-image-margin-bottom);
      display: block;
    }

    /* Figures */
    .typst-content .figure {
      margin-top: var(--typst-figure-margin-top);
      margin-bottom: var(--typst-figure-margin-bottom);
      padding: 0;
      border: 0;
      background: transparent;
      text-align: center;
    }

    .typst-content .figure .figure-content {
      display: flex;
      justify-content: center;
    }

    /* Avoid double vertical margins (figure margin + img margin) */
    .typst-content .figure img {
      margin: 0 auto;
    }

    .typst-content .figure figcaption {
      margin-top: var(--typst-figcaption-margin-top);
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Scroll margin for figure targets */
    .typst-content .figure[id] {
      scroll-margin-top: 24px;
    }

    /* Theorem Boxes */
    .typst-content .thm-box {
      margin: var(--box-margin);
      padding: var(--box-padding);
      border: var(--box-border);
      border-radius: 0;
      background: var(--box-bg);
    }

    .typst-content .thm-box-title {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: inherit;
      margin-bottom: 0.5rem;
      display: block;
    }

    .typst-content .thm-box p:last-child {
      margin-bottom: 0;
    }

    .typst-content .thm-box > ul:last-child,
    .typst-content .thm-box > ol:last-child {
      margin-bottom: var(--typst-list-last-in-container-margin-bottom);
    }

    /* Proof (toggleable; emitted as <details class="proof-box"> in HTML export) */
    .typst-content details.proof-box {
      margin: 1.25rem 0;
      border: 0;
      background: transparent;
    }

    .typst-content details.proof-box:not(.toggle-box) {
      padding: 0.65rem 0.9rem;
      border-left: 3px solid var(--proof-highlight-border);
      background: var(--proof-highlight-bg);
    }

    .typst-content details.proof-box > summary {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0;
      border: 0;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
      user-select: none;
      list-style: none;
      outline: none;
    }

    .typst-content details.proof-box > summary::-webkit-details-marker {
      display: none;
    }

    .typst-content details.proof-box > summary::before {
      content: '▸';
      display: inline-block;
      color: var(--text-secondary);
      transform: translateY(-0.02em);
    }

    .typst-content details.proof-box[open] > summary::before {
      content: '▾';
    }

    /* No divider line under the proof header */

    .typst-content .proof-box-body {
      /* extra breathing room after the summary line */
      padding: 0.75rem 0 0;
    }

    .typst-content .proof-box-body > p:last-child {
      margin-bottom: 0;
    }

    .typst-content .proof-box-body > ul:last-child,
    .typst-content .proof-box-body > ol:last-child {
      margin-bottom: var(--typst-list-last-in-container-margin-bottom);
    }

    .typst-content details.proof-box > summary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* `#toggle[...]` uses the same markup/style as proof toggles. */

    /* QED square - render at end of the final proof line.
       We do this by wrapping paragraph content into `.qed-text` (JS),
       then using flex to push the QED box to the right without creating
       a new paragraph line. */
    .typst-content p.has-qed {
      display: flex;
      align-items: flex-end;
      gap: 0.75em;
    }

    .typst-content p.has-qed > .qed-text {
      flex: 1 1 auto;
      min-width: 0;
    }

    .typst-content p.has-qed > span.qed {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    /* QED in standalone paragraph (when proof ends with block element) */
    .typst-content .qed-paragraph {
      text-align: right;
      margin-top: -0.5em; /* Tighten spacing since QED follows content */
    }

    /* Theorem */
    .typst-content .thm-theorem {
      --thm-accent: var(--text-primary);
      background: var(--thm-blue-bg);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .typst-content .thm-theorem {
        background: var(--thm-blue-bg);
      }
    }
    [data-theme="dark"] .typst-content .thm-theorem {
      background: var(--thm-blue-bg);
    }
    /* Lemma */
    .typst-content .thm-lemma {
      --thm-accent: var(--text-primary);
      background: var(--thm-blue-bg);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .typst-content .thm-lemma {
        background: var(--thm-blue-bg);
      }
    }
    [data-theme="dark"] .typst-content .thm-lemma {
      background: var(--thm-blue-bg);
    }
    /* Proposition */
    .typst-content .thm-proposition {
      --thm-accent: var(--text-primary);
      background: var(--thm-blue-bg);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .typst-content .thm-proposition {
        background: var(--thm-blue-bg);
      }
    }
    [data-theme="dark"] .typst-content .thm-proposition {
      background: var(--thm-blue-bg);
    }
    /* Corollary (same colors as Proposition) */
    .typst-content .thm-corollary {
      --thm-accent: var(--text-primary);
      background: var(--thm-blue-bg);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .typst-content .thm-corollary {
        background: var(--thm-blue-bg);
      }
    }
    [data-theme="dark"] .typst-content .thm-corollary {
      background: var(--thm-blue-bg);
    }
    /* Definition */
    .typst-content .thm-definition {
      --thm-accent: var(--text-primary);
      background: var(--thm-definition-bg);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .typst-content .thm-definition {
        background: var(--thm-definition-bg);
      }
    }
    [data-theme="dark"] .typst-content .thm-definition {
      background: var(--thm-definition-bg);
    }
    /* Fact */
    .typst-content .thm-fact {
      --thm-accent: var(--text-primary);
      background: var(--box-bg);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .typst-content .thm-fact {
        background: var(--box-bg);
      }
    }
    [data-theme="dark"] .typst-content .thm-fact {
      background: var(--box-bg);
    }
    /* Example */
    .typst-content .thm-example {
      --thm-accent: var(--text-primary);
      background: var(--thm-example-bg);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .typst-content .thm-example {
        background: var(--thm-example-bg);
      }
    }
    [data-theme="dark"] .typst-content .thm-example {
      background: var(--thm-example-bg);
    }
    /* Idea */
    .typst-content .thm-idea {
      --thm-accent: var(--text-primary);
      background: var(--thm-idea-bg);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .typst-content .thm-idea {
        background: var(--thm-idea-bg);
      }
    }
    [data-theme="dark"] .typst-content .thm-idea {
      background: var(--thm-idea-bg);
    }

    /* Content box (generic bordered box) #Box */
    .typst-content .content-box {
      border: var(--box-border);
      padding: var(--box-padding);
      margin: var(--box-margin);
      background: var(--box-bg);
    }

    .typst-content .content-box > *:last-child,
    .typst-content .content-box > p:last-child {
      margin-bottom: 0;
    }

    /* Horizontal lines */
    .typst-content hr.hline {
      border: none;
      height: 1px;
      background: var(--text-primary);
      margin: 0.5rem 0rem;
    }

    .typst-content hr.dline {
      border: none;
      height: 1px;
      background: transparent;
      border-top: 1px dotted var(--text-primary);
      margin: 0.5rem 0;
    }

    /* Footnotes */
    .typst-content .footnote-marker {
      font-size: 0.75em;
      vertical-align: super;
      line-height: 0;
      margin: 0 0.1em;
      color: var(--accent);
      cursor: help;
    }
    .typst-content .footnote-ref {
      text-decoration: none;
      font-weight: 500;
      color: inherit;
    }
    .typst-content .footnote-content {
      display: none !important;
    }
    /* Footnote tooltip on hover */
    .typst-content .footnote-marker {
      position: relative;
    }
    .typst-content .footnote-marker:hover .footnote-tooltip {
      display: block;
    }
    .footnote-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: 0;
      padding: 12px 16px;
      min-width: 280px;
      max-width: 450px;
      box-shadow: none;
      z-index: 1000;
      font-size: 1rem;
      line-height: 1.6;
      text-align: left;
      white-space: normal;
      cursor: auto;
      /* Reset font properties since parent is small */
      font-weight: normal;
      vertical-align: baseline;
      color: var(--text-primary);
    }
    .footnote-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--border-strong);
    }
    /* Footnotes section at bottom (toggleable) */
    details.footnotes-section {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    details.footnotes-section > summary {
      cursor: pointer;
      user-select: none;
      list-style: none;
      outline: none;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    details.footnotes-section > summary::-webkit-details-marker {
      display: none;
    }

    details.footnotes-section > summary::after {
      content: '▸';
      color: var(--text-muted);
      flex: 0 0 auto;
    }
    details.footnotes-section[open] > summary::after {
      content: '▾';
    }

    details.footnotes-section > ol {
      margin: 0;
      padding-left: 1.5rem;
    }
    details.footnotes-section li {
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }
    details.footnotes-section li::marker {
      color: var(--list-marker-color);
    }

    /* Hide Typst's default footnote rendering */
    .typst-content > section[role="doc-endnotes"],
    .typst-content > aside.footnotes,
    .typst-content > .footnotes:not(.footnotes-section),
    .typst-content > hr + ol,
    .typst-content > div.footnotes,
    /* Same selectors through .page-section wrapper (paged-sections mode) */
    .typst-content > .page-section > section[role="doc-endnotes"],
    .typst-content > .page-section > aside.footnotes,
    .typst-content > .page-section > .footnotes:not(.footnotes-section),
    .typst-content > .page-section > hr + ol,
    .typst-content > .page-section > div.footnotes,
    .typst-content > .page-section > hr:last-of-type,
    .typst-content [role="doc-endnote"],
    .typst-content [role="doc-endnotes"],
    .typst-content aside[role="note"],
    .typst-content .typst-footnote-entry,
    .typst-content > hr:last-of-type {
      display: none;
    }

    /* Outline/TOC in content - hide it since we have sidebar */
    .typst-content nav[role="doc-toc"],
    .typst-content .outline {
      display: none;
    }

    /* Highlight effect for scrollspy */
    .section-highlight {
      animation: highlight 1.5s ease;
    }

    @keyframes highlight {
      0% { background: var(--accent-soft); }
      100% { background: transparent; }
    }

    .toc-overlay {
      display: none;
    }

    .search-panel {
      position: fixed;
      top: 18px;
      left: 50%;
      width: min(520px, calc(100vw - 32px));
      max-height: min(520px, calc(100vh - 36px));
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      z-index: 220;
    }

    .search-panel.open {
      display: flex;
    }

    .search-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      flex: 1;
      min-width: 0;
      border: 0;
      background: transparent;
      color: var(--text-primary);
      font: inherit;
      padding: 10px 12px;
      outline: none;
    }

    .search-count {
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 0 10px;
      white-space: nowrap;
    }

    .search-close {
      border: 0;
      border-left: 1px solid var(--border);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font: inherit;
      padding: 10px 12px;
    }

    .search-results {
      list-style: none;
      margin: 0;
      padding: 0;

  <script>
    // Apply settings synchronously before page render to prevent flash
    (function() {
      try {
        const saved = localStorage.getItem('typst-reader-settings');
        if (saved) {
          const settings = JSON.parse(saved);
          const root = document.documentElement;
          
          // Presets (must match the ones in TypstReader class)
          const presets = {
            font: {
              classic: { family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif", size: '1rem' },
              modern: { family: "'DM Sans', system-ui, sans-serif", size: '1.05rem' },
              literary: { family: "'Crimson Text', 'Times New Roman', serif", size: '1.15rem' },
              technical: { family: "'IBM Plex Mono', 'Consolas', monospace", size: '0.95rem' }
            },
            spacing: {
              compact: '1.5',
              normal: '1.56',
              relaxed: '2'
            },
            width: {
              narrow: '720px',
              normal: '860px',
              wide: '1000px'
            }
          };
          
          // Apply theme
          if (settings.theme && settings.theme !== 'auto') {
            root.setAttribute('data-theme', settings.theme);
          }
          
          // Apply font
          if (settings.font && presets.font[settings.font]) {
            const fontPreset = presets.font[settings.font];
            root.style.setProperty('--content-font', fontPreset.family);
            root.style.setProperty('--content-font-size', fontPreset.size);
          }
          
          // Apply spacing
          if (settings.spacing && presets.spacing[settings.spacing]) {
            root.style.setProperty('--content-line-height', presets.spacing[settings.spacing]);
          }
          
          // Apply width
          if (settings.width && presets.width[settings.width]) {
            root.style.setProperty('--content-max-width', presets.width[settings.width]);
          }
        }
      } catch (e) {
        // Silently fail if localStorage is unavailable or settings are invalid
      }
    })();
  </script>

    <script>
      // Number headings synchronously before render to prevent flicker
      (function() {
        const content = document.getElementById('typst-content');
        if (!content) return;
        
        const headingElements = content.querySelectorAll('h1.numbered-heading, h2.numbered-heading, h3.numbered-heading, h4.numbered-heading');
        const counters = [0, 0, 0, 0];
        
        headingElements.forEach((el) => {
          // Skip if already has a heading-number span
          if (el.querySelector('.heading-number')) return;
          
          const dataLevel = el.getAttribute('data-level');
          const level = dataLevel ? parseInt(dataLevel) : parseInt(el.tagName[1]);
          const text = el.textContent.trim();
          
          // Skip if already has a number prefix in text
          if (text.match(/^([\d.]+)\s*/)) return;
          
          // Increment counter at current level
          const levelIdx = level - 1;
          counters[levelIdx]++;
          // Reset deeper level counters
          for (let i = levelIdx + 1; i < counters.length; i++) {
            counters[i] = 0;
          }
          // Build number string
          const number = counters.slice(0, level).filter(n => n > 0).join('.');
          if (number) {
            el.innerHTML = `<span class="heading-number">${number}.</span> ${el.innerHTML}`;
          }
        });
      })();
    </script>

  <script>
    class TypstReader {
      constructor() {
        this.toc = document.getElementById('toc');
        this.tocList = document.getElementById('toc-list');
        this.tocTitle = document.getElementById('toc-title');
        this.tocOverlay = document.getElementById('toc-overlay');
        this.mobileTocToggle = document.getElementById('toc-mobile-toggle');
        this.sectionJump = document.getElementById('section-jump');
        this.sectionJumpInput = document.getElementById('section-jump-input');
        this.sectionJumpStatus = document.getElementById('section-jump-status');
        this.settingsToggle = document.getElementById('settings-toggle');
        this.settingsPanel = document.getElementById('settings-panel');
        this.content = document.getElementById('typst-content');
        this.contentWrapper = document.querySelector('.content-wrapper');
        this.searchPanel = document.getElementById('search-panel');
        this.searchInput = document.getElementById('search-input');
        this.searchResultsEl = document.getElementById('search-results');
        this.searchCount = document.getElementById('search-count');
        this.searchClose = document.getElementById('search-close');
        this.keybindsPanel = document.getElementById('keybinds-panel');
        this.keybindsClose = document.getElementById('keybinds-close');
        
        this.headings = [];
        this.pageSections = false;
        this.pageSectionEls = null;
        this.searchMatches = [];
        this.activeSearchIndex = -1;
        this.sectionJumpMatches = [];
        this.activeSectionJumpIndex = -1;
        this.sidebarMarkerIndex = -1;
        this.sidebarMarkerIsImplicit = false;
        this._hashChangeAttached = false;
        this._navBackStack = [];
        this._navForwardStack = [];
        
        // Setting presets
        this.presets = {
          font: {
            classic: { family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif", size: '1rem' },
            modern: { family: "'DM Sans', system-ui, sans-serif", size: '1.05rem' },
            literary: { family: "'Crimson Text', 'Times New Roman', serif", size: '1.15rem' },
            technical: { family: "'IBM Plex Mono', 'Consolas', monospace", size: '0.95rem' }
          },
          spacing: {
            compact: '1.5',
            normal: '1.56',
            relaxed: '2'
          },
          width: {
            narrow: '720px',
            normal: '860px',
            wide: '1000px'
          }
        };
        
        // Default settings
        this.settings = {
          theme: 'auto',
          font: 'modern',
          spacing: 'compact',
          width: 'normal'
        };
        
        this.init();
      }

      init() {
        this.cleanPlaceholders();
        this.loadSettings();
        this.applySettings();
        this.extractHeadings();
        this.buildToc();
        this.setupPageSections();
        this.setupScrollspy();
        this.setupMobileToggle();
        this.setupSidebarKeyboardNavigation();
        this.setupSectionJump();
        this.setupSettingsPanel();
        this.setupKeybindsPanel();
        this.setupHeadingTabNavigation();
        this.setupCodeBlockCopyButtons();
        this.setupFootnotes();
        this.setupProofToggles();
        this.setupToggleScrollPreservation();
        this.fixQedPlacement();
        this.fixInlineMathBaseline();
        this.fixTallInlineMath();
        this.fixSectionLinks();
        this.setupNavHistory();
        this.setupGlobalSearch();
        
        // Show TOC list after it's built
        if (this.tocList) {
          requestAnimationFrame(() => {
            this.tocList.classList.add('ready');
          });
        }
      }

      cleanPlaceholders() {
        document.querySelectorAll('.toc-header [class^="toc-"]').forEach(el => {
          if (el.textContent.match(/^\{\{.*\}\}$/)) el.textContent = '';
        });
      }

      loadSettings() {
        const saved = localStorage.getItem('typst-reader-settings');
        if (saved) {
          try {
            this.settings = { ...this.settings, ...JSON.parse(saved) };
          } catch (e) {
            console.warn('Failed to load settings:', e);
          }
        }
      }

      saveSettings() {
        localStorage.setItem('typst-reader-settings', JSON.stringify(this.settings));
      }

      applySettings() {
        // Apply theme
        if (this.settings.theme === 'auto') {
          document.documentElement.removeAttribute('data-theme');
        } else {
          document.documentElement.setAttribute('data-theme', this.settings.theme);
        }
        
        // Apply font
        const fontPreset = this.presets.font[this.settings.font];
        if (fontPreset) {
          document.documentElement.style.setProperty('--content-font', fontPreset.family);
          document.documentElement.style.setProperty('--content-font-size', fontPreset.size);
        }
        
        // Apply spacing
        const spacingValue = this.presets.spacing[this.settings.spacing];
        if (spacingValue) {
          document.documentElement.style.setProperty('--content-line-height', spacingValue);
        }
        
        // Apply width
        const widthValue = this.presets.width[this.settings.width];
        if (widthValue) {
          document.documentElement.style.setProperty('--content-max-width', widthValue);
        }
        
        // Update active buttons
        this.updateActiveButtons();
      }

      updateActiveButtons() {
        if (!this.settingsPanel) return;
        
        Object.keys(this.settings).forEach(setting => {
          const container = this.settingsPanel.querySelector(`[data-setting="${setting}"]`);
          if (container) {
            container.querySelectorAll('.settings-btn').forEach(btn => {
              btn.classList.toggle('active', btn.dataset.value === this.settings[setting]);
            });
          }
        });
      }

      setupSettingsPanel() {
        if (!this.settingsToggle || !this.settingsPanel) return;
        
        // Toggle panel
        this.settingsToggle.addEventListener('click', () => {
          this.settingsPanel.classList.toggle('open');
          this.settingsToggle.classList.toggle('active');
        });
        
        // Handle setting changes
        this.settingsPanel.querySelectorAll('.settings-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const settingType = btn.closest('[data-setting]').dataset.setting;
            const value = btn.dataset.value;
            
            this.settings[settingType] = value;
            this.saveSettings();
            this.applySettings();
          });
        });
        
        // Initialize active states
        this.updateActiveButtons();
      }

      setupKeybindsPanel() {
        if (!this.keybindsPanel) return;

        this.keybindsClose?.addEventListener('click', () => this.closeKeybindsPanel());
        this.keybindsPanel.addEventListener('click', (e) => {
          if (e.target === this.keybindsPanel) this.closeKeybindsPanel();
        });

        document.addEventListener('keydown', (e) => {
          const key = typeof e.key === 'string' ? e.key.toLowerCase() : '';
          const isSlash = key === '/' || e.code === 'Slash';

          if (e.metaKey && !e.ctrlKey && !e.altKey && isSlash) {
            e.preventDefault();
            this.toggleKeybindsPanel();
            return;
          }

          if (e.key === 'Escape' && this.keybindsPanel.classList.contains('open')) {
            e.preventDefault();
            this.closeKeybindsPanel();
          }
        });
      }

      openKeybindsPanel() {
        if (!this.keybindsPanel) return;
        this.keybindsPanel.classList.add('open');
        this.keybindsPanel.setAttribute('aria-hidden', 'false');
        requestAnimationFrame(() => this.keybindsClose?.focus());
      }

      closeKeybindsPanel() {
        if (!this.keybindsPanel) return;
        this.keybindsPanel.classList.remove('open');
        this.keybindsPanel.setAttribute('aria-hidden', 'true');
      }

      toggleKeybindsPanel() {
        if (this.keybindsPanel?.classList.contains('open')) {
          this.closeKeybindsPanel();
        } else {
          this.openKeybindsPanel();
        }
      }

      setupHeadingTabNavigation() {
        document.addEventListener('keydown', (e) => {
          if (e.key !== 'Tab' || !e.altKey || e.ctrlKey || e.metaKey) return;

          if (this.isEditableElement(document.activeElement)) return;
          if (this.keybindsPanel?.classList.contains('open')) return;
          if (this.searchPanel?.classList.contains('open')) return;
          if (this.sectionJump?.classList.contains('open')) return;
          if (!this.moveSelectionToBigHeading(e.shiftKey ? -1 : 1)) return;

          e.preventDefault();
        }, true);
      }

      isEditableElement(element) {
        return Boolean(element && (
          element.tagName === 'TEXTAREA' ||
          element.tagName === 'INPUT' ||
          element.tagName === 'SELECT' ||
          element.isContentEditable
        ));
      }

      moveSelectionToBigHeading(direction) {
        const headings = this.getBigHeadings();
        if (headings.length === 0) return false;

        const selection = window.getSelection();
        const focusNode = selection?.focusNode || selection?.anchorNode || null;
        const currentIndex = this.getCurrentBigHeadingIndex(headings, focusNode);
        const targetIndex = this.getTargetBigHeadingIndex(headings, currentIndex, focusNode, direction);
        const target = headings[targetIndex];
        if (!target) return false;

        const parentSection = target.closest('.page-section');
        if (this.pageSections && parentSection) {
          this.activatePageSection(parentSection);
        }

        this.placeSelectionAtElementEnd(target);
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return true;
      }

      getBigHeadings() {
        if (this.pageSectionLevel) {
          return Array.from(this.content.querySelectorAll('h' + this.pageSectionLevel));
        }
        if (this.headings.length > 0) {
          const minLevel = Math.min(...this.headings.map(h => h.level));
          return this.headings
            .filter(h => h.level === minLevel)
            .map(h => h.element)
            .filter(Boolean);
        }
        return Array.from(this.content.querySelectorAll('h1, h2'));
      }

      getCurrentBigHeadingIndex(headings, focusNode) {
        if (!focusNode) {
          const activeSection = this.pageSectionEls?.find(sec => sec.classList.contains('active'));
          const activeHeading = activeSection ? headings.find(h => activeSection.contains(h)) : null;
          return Math.max(0, headings.indexOf(activeHeading));
        }

        const focusElement = focusNode.nodeType === Node.ELEMENT_NODE ? focusNode : focusNode.parentElement;
        const containingIndex = headings.findIndex(heading => heading.contains(focusElement));
        if (containingIndex >= 0) return containingIndex;

        for (let i = headings.length - 1; i >= 0; i--) {
          const order = headings[i].compareDocumentPosition(focusNode);
          if (order & Node.DOCUMENT_POSITION_FOLLOWING) return i;
        }
        return 0;
      }

      getTargetBigHeadingIndex(headings, currentIndex, focusNode, direction) {
        const current = headings[currentIndex];
        if (!focusNode) return currentIndex;
        if (direction < 0) {
          if (current && focusNode && !current.contains(focusNode)) return currentIndex;
          return Math.max(0, currentIndex - 1);
        }
        if (current && focusNode && current.contains(focusNode) && !this.isSelectionAtElementEnd(current)) {
          return currentIndex;
        }
        return Math.min(headings.length - 1, currentIndex + 1);
      }

      isSelectionAtElementEnd(element) {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) return false;

        const current = selection.getRangeAt(0).cloneRange();
        const end = document.createRange();
        end.selectNodeContents(element);
        end.collapse(false);
        return current.compareBoundaryPoints(Range.START_TO_START, end) === 0;
      }

      placeSelectionAtElementEnd(element) {
        const selection = window.getSelection();
        if (!selection) return;

        const range = document.createRange();
        range.selectNodeContents(element);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      extractHeadings() {
        // Find all headings (with or without IDs)
        const headingElements = this.content.querySelectorAll('h1, h2, h3, h4');
        
        // Track heading counters for auto-numbering [level1, level2, level3, level4]
        const counters = [0, 0, 0, 0];

        // Track used slugs for deduplication
        const usedSlugs = new Set();
        
        headingElements.forEach((el, index) => {
          // Use data-level attribute if present (from Typst), otherwise fall back to tag level
          const dataLevel = el.getAttribute('data-level');
          const level = dataLevel ? parseInt(dataLevel) : parseInt(el.tagName[1]);
          const text = el.textContent.trim();
          
          // Extract number if present - check for heading-number span first
          let number = '';
          let cleanText = text;
          let cleanHtml = el.innerHTML; // Preserve HTML for colored tags like [TODO], [REVIEW]
          const headingNumberSpan = el.querySelector('.heading-number');
          if (headingNumberSpan) {
            number = headingNumberSpan.textContent.replace(/\.$/, ''); // Remove trailing dot
            cleanText = el.textContent.replace(headingNumberSpan.textContent, '').trim();
            // Remove the heading-number span from HTML
            cleanHtml = el.innerHTML.replace(headingNumberSpan.outerHTML, '').trim();
          } else {
            // Fall back to text matching (e.g., "1. Introduction" -> "1.")
            let numberMatch = text.match(/^([\d.]+)\s*/);
            number = numberMatch ? numberMatch[1] : '';
            cleanText = numberMatch ? text.replace(numberMatch[0], '') : text;
            // Remove number prefix from HTML too
            if (numberMatch) {
              cleanHtml = el.innerHTML.replace(/^[\d.]+\.\s*/, '');
            }
          }

          // Generate ID if not present, using the clean (number-stripped) text for a readable slug
          let id = el.id;
          if (!id) {
            let slug = cleanText.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '');
            if (!slug) slug = 'section-' + index;
            // Deduplicate: append a suffix only if the slug is already taken
            let candidate = slug;
            let suffix = 2;
            while (usedSlugs.has(candidate)) {
              candidate = slug + '-' + suffix;
              suffix++;
            }
            id = candidate;
            el.id = id;
          }
          usedSlugs.add(id);
          
          // Auto-generate numbers for numbered-heading class if no number found
          if (!number && el.classList.contains('numbered-heading') && !headingNumberSpan) {
            // Increment counter at current level (1-indexed, array is 0-indexed)
            const levelIdx = level - 1;
            counters[levelIdx]++;
            // Reset deeper level counters
            for (let i = levelIdx + 1; i < counters.length; i++) {
              counters[i] = 0;
            }
            // Build number string (e.g., "1.2.3")
            number = counters.slice(0, level).filter(n => n > 0).join('.');
            // Prepend number to heading text in the DOM
            if (number) {
              el.innerHTML = `<span class="heading-number">${number}.</span> ${el.innerHTML}`;
              // cleanHtml stays as original (without the new number)
            }
          }
          
          this.headings.push({
            level,
            text: cleanText,
            html: cleanHtml, // Store HTML to preserve colored tags
            number,
            id,
            element: el
          });
        });
      }

      buildToc() {
        if (this.headings.length === 0) {
          this.tocList.innerHTML = '<li style="padding: 12px 24px; color: var(--text-toc-muted); font-size: 0.875rem;">No headings found</li>';
          return;
        }

        // Keep the template-provided title (note name) instead of overriding with first heading

        this.tocList.innerHTML = this.headings
          .filter(h => h.level <= 3) // Only show h1, h2, h3
          .map(h => `
            <li class="toc-item">
              <a href="#${h.id}" class="toc-link" data-level="${h.level}" data-id="${h.id}">
                ${h.number ? `<span class="toc-number">${h.number}</span>` : ''}
                <span class="toc-text">${h.html || h.text}</span>
              </a>
            </li>
          `).join('');

        // Click handlers
        this.tocList.querySelectorAll('.toc-link').forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const id = link.dataset.id;
            const target = document.getElementById(id);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              // Close mobile TOC
              this.closeMobileToc();
            }
          });
        });
      }

      setupScrollspy() {
        if (this._scrollspyObserver) {
          this._scrollspyObserver.disconnect();
        }
        this._scrollspyObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                this.setActiveLink(entry.target.id);
              }
            });
          },
          {
            rootMargin: '-10% 0px -80% 0px',
            threshold: 0
          }
        );

        this.headings.forEach(h => {
          if (h.element) this._scrollspyObserver.observe(h.element);
        });
      }

      setActiveLink(id) {
        this.tocList.querySelectorAll('.toc-link').forEach(link => {
          link.classList.toggle('active', link.dataset.id === id);
        });
        if (this.sidebarMarkerIsImplicit) {
          this.showSidebarMarkerForActiveLink(true);
        }
      }

      setupMobileToggle() {
        this.mobileTocToggle?.addEventListener('click', () => {
          this.toggleMobileToc();
        });

        document.addEventListener('keydown', (e) => {
          const key = typeof e.key === 'string' ? e.key.toLowerCase() : '';

          const active = document.activeElement;
          const isEditable = active && (
            active.tagName === 'INPUT' ||
            active.tagName === 'TEXTAREA' ||
            active.tagName === 'SELECT' ||
            active.isContentEditable
          );
          const selectedText = window.getSelection()?.toString() || '';

          if (e.ctrlKey && !e.metaKey && !e.altKey && key === 's') {
            e.preventDefault();
            this.toggleMobileToc();
            return;
          }

          if (!e.ctrlKey || e.metaKey || e.altKey || key !== 'c') return;
          if (!window.matchMedia('(max-width: 1164px)').matches) return;
          if (isEditable || selectedText.trim()) return;

          e.preventDefault();
          this.toggleMobileToc();
        });

        this.tocOverlay.addEventListener('click', () => {
          this.closeMobileToc();
        });
      }

      toggleMobileToc() {
        if (this.toc.classList.contains('open')) {
          this.closeMobileToc();
        } else {
          this.openMobileToc();
        }
      }

      openMobileToc() {
        this.toc.classList.add('open');
        this.tocOverlay.classList.add('open');
        this.mobileTocToggle?.setAttribute('aria-expanded', 'true');
        this.mobileTocToggle?.setAttribute('aria-label', 'Hide sidebar');
        this.showSidebarMarkerForActiveLink();
      }

      closeMobileToc() {
        this.toc.classList.remove('open');
        this.tocOverlay.classList.remove('open');
        this.mobileTocToggle?.setAttribute('aria-expanded', 'false');
        this.mobileTocToggle?.setAttribute('aria-label', 'Show sidebar');
        this.clearSidebarMarker();
        this.closeSectionJump();
        this.closeGlobalSearch();
      }

      setupSidebarKeyboardNavigation() {
        this.toc?.addEventListener('focusin', () => {
          this.showSidebarMarkerForActiveLink();
        });

        this.toc?.addEventListener('focusout', (e) => {
          if (this.sidebarMarkerIsImplicit && !this.toc.contains(e.relatedTarget)) {
            this.clearSidebarMarker();
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey || e.metaKey || e.altKey) return;
          if (!['ArrowDown', 'ArrowUp', 'Enter', 'Escape'].includes(e.key)) return;
          if (this.searchPanel?.classList.contains('open') || this.keybindsPanel?.classList.contains('open')) return;
          if (this.sectionJump?.classList.contains('open')) return;

          const active = document.activeElement;
          const isEditable = active && (
            active.tagName === 'INPUT' ||
            active.tagName === 'TEXTAREA' ||
            active.tagName === 'SELECT' ||
            active.isContentEditable
          );
          if (isEditable || !this.isSidebarContextActive()) return;

          if (e.key === 'ArrowDown') {
            e.preventDefault();
            this.moveSidebarMarker(1);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            this.moveSidebarMarker(-1);
          } else if (e.key === 'Enter' && this.sidebarMarkerIndex >= 0) {
            e.preventDefault();
            this.activateSidebarMarker();
          } else if (e.key === 'Escape' && this.sidebarMarkerIndex >= 0) {
            e.preventDefault();
            this.clearSidebarMarker();
          }
        });
      }

      getSidebarTocLinks() {
        return Array.from(this.tocList?.querySelectorAll('.toc-link') || []);
      }

      getActiveSidebarLinkIndex(links) {
        return links.findIndex(link => link.classList.contains('active'));
      }

      showSidebarMarkerForActiveLink(force = false) {
        if (!force && this.sidebarMarkerIndex >= 0) return;
        const links = this.getSidebarTocLinks();
        if (links.length === 0) return;

        const activeIndex = this.getActiveSidebarLinkIndex(links);
        if (activeIndex < 0) return;
        this.setSidebarMarker(activeIndex, links, true);
      }

      moveSidebarMarker(delta) {
        const links = this.getSidebarTocLinks();
        if (links.length === 0) return;

        const markerStillValid = this.sidebarMarkerIndex >= 0 && this.sidebarMarkerIndex < links.length;
        const baseIndex = markerStillValid
          ? this.sidebarMarkerIndex
          : this.getActiveSidebarLinkIndex(links);
        const fallbackIndex = delta > 0 ? -1 : links.length;
        const nextIndex = (baseIndex >= 0 ? baseIndex : fallbackIndex) + delta;
        this.setSidebarMarker((nextIndex + links.length) % links.length, links);
      }

      setSidebarMarker(index, links = this.getSidebarTocLinks(), implicit = false) {
        this.clearSidebarMarker();
        const link = links[index];
        if (!link) return;
        this.sidebarMarkerIndex = index;
        this.sidebarMarkerIsImplicit = implicit;
        link.classList.add('sidebar-keyboard-marker');
        link.scrollIntoView({ block: 'nearest' });
      }

      clearSidebarMarker() {
        this.sidebarMarkerIndex = -1;
        this.sidebarMarkerIsImplicit = false;
        this.tocList?.querySelectorAll('.sidebar-keyboard-marker').forEach(link => {
          link.classList.remove('sidebar-keyboard-marker');
        });
      }

      activateSidebarMarker() {
        const link = this.getSidebarTocLinks()[this.sidebarMarkerIndex];
        if (!link) return;
        link.click();
      }

      setupSectionJump() {
        if (!this.sectionJump || !this.sectionJumpInput || !this.sectionJumpStatus) return;

        document.addEventListener('keydown', (e) => {
          const key = typeof e.key === 'string' ? e.key.toLowerCase() : '';
          if (key !== '/' || e.ctrlKey || e.metaKey || e.altKey) return;
          if (this.searchPanel?.classList.contains('open') || this.keybindsPanel?.classList.contains('open')) return;

          const active = document.activeElement;
          const isEditable = active && (
            active.tagName === 'INPUT' ||
            active.tagName === 'TEXTAREA' ||
            active.tagName === 'SELECT' ||
            active.isContentEditable
          );
          if (isEditable || !this.isSidebarContextActive()) return;

          e.preventDefault();
          this.openSectionJump();
        });

        this.sectionJumpInput.addEventListener('input', () => {
          this.updateSectionJumpMatches();
        });

        this.sectionJumpInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            this.navigateToSectionJumpMatch();
          } else if (e.key === 'Escape') {
            e.preventDefault();
            this.closeSectionJump();
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            this.moveSectionJumpMatch(1);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            this.moveSectionJumpMatch(-1);
          }
        });
      }

      isSidebarContextActive() {
        const active = document.activeElement;
        return Boolean(
          (active && this.toc?.contains(active)) ||
          this.toc?.matches(':hover') ||
          this.toc?.classList.contains('open')
        );
      }

      openSectionJump() {
        this.sectionJump.classList.add('open');
        requestAnimationFrame(() => {
          this.sectionJumpInput.focus();
          this.sectionJumpInput.select();
          this.updateSectionJumpMatches();
        });
      }

      closeSectionJump() {
        if (!this.sectionJump || !this.sectionJumpInput || !this.sectionJumpStatus) return;
        this.sectionJump.classList.remove('open');
        this.sectionJumpInput.value = '';
        this.sectionJumpStatus.textContent = '';
        this.clearSectionJumpHighlights();
      }

      normalizeSectionQuery(value) {
        return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
      }

      updateSectionJumpMatches() {
        const query = this.normalizeSectionQuery(this.sectionJumpInput.value);
        this.clearSectionJumpHighlights();
        this.sectionJumpMatches = [];
        this.activeSectionJumpIndex = -1;

        if (!query) {
          this.sectionJumpStatus.textContent = 'Type a section name or number';
          return;
        }

        const candidates = this.headings
          .filter(h => h.level <= 3)
          .map((heading, order) => {
            const number = this.normalizeSectionQuery(heading.number);
            const text = this.normalizeSectionQuery(heading.text);
            const label = this.normalizeSectionQuery(`${heading.number || ''} ${heading.text || ''}`);
            let score = Infinity;
            if (number === query || text === query || label === query) score = 0;
            else if (number.startsWith(query)) score = 1;
            else if (text.startsWith(query)) score = 2;
            else if (label.startsWith(query)) score = 3;
            else if (number.includes(query)) score = 4;
            else if (text.includes(query) || label.includes(query)) score = 5;
            return { heading, order, score };
          })
          .filter(item => item.score !== Infinity)
          .sort((a, b) => a.score - b.score || a.order - b.order);

        this.sectionJumpMatches = candidates.map(item => item.heading);
        if (this.sectionJumpMatches.length === 0) {
          this.sectionJumpStatus.textContent = 'No matching section';
          return;
        }

        this.activeSectionJumpIndex = 0;
        this.highlightSectionJumpMatch();
      }

      moveSectionJumpMatch(delta) {
        if (this.sectionJumpMatches.length === 0) return;
        this.activeSectionJumpIndex =
          (this.activeSectionJumpIndex + delta + this.sectionJumpMatches.length) % this.sectionJumpMatches.length;
        this.highlightSectionJumpMatch();
      }

      highlightSectionJumpMatch() {
        this.clearSectionJumpHighlights();
        const heading = this.sectionJumpMatches[this.activeSectionJumpIndex];
        const link = heading ? this.getTocLinkForHeading(heading) : null;
        if (!link) return;

        link.classList.add('section-jump-match');
        link.scrollIntoView({ block: 'nearest' });
        this.sectionJumpStatus.textContent = `${this.activeSectionJumpIndex + 1}/${this.sectionJumpMatches.length}`;
      }

      clearSectionJumpHighlights() {
        this.tocList?.querySelectorAll('.section-jump-match').forEach(link => {
          link.classList.remove('section-jump-match');
        });
      }

      getTocLinkForHeading(heading) {
        return Array.from(this.tocList?.querySelectorAll('.toc-link') || [])
          .find(link => link.dataset.id === heading.id);
      }

      navigateToSectionJumpMatch() {
        const heading = this.sectionJumpMatches[this.activeSectionJumpIndex];
        const link = heading ? this.getTocLinkForHeading(heading) : null;
        if (!link) return;

        link.click();
        this.closeSectionJump();
      }

      setupCodeBlockCopyButtons() {
        if (!this.content) return;

        this.content.querySelectorAll('pre').forEach((pre) => {
          const code = pre.querySelector('code');
          if (!code || pre.querySelector(':scope > .code-copy-btn')) return;

          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'code-copy-btn';
          button.textContent = 'Copy';
          button.setAttribute('aria-label', 'Copy code');

          button.addEventListener('click', async () => {
            const text = code.innerText;
            const copied = await this.copyText(text);
            button.textContent = copied ? 'Copied' : 'Failed';
            button.blur();
            window.setTimeout(() => {
              button.textContent = 'Copy';
            }, 1200);
          });

          pre.appendChild(button);
        });
      }

      async copyText(text) {
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch (err) {}

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          return document.execCommand('copy');
        } catch (err) {
          return false;
        } finally {
          textarea.remove();
        }
      }

      setupGlobalSearch() {
        if (!this.searchPanel || !this.searchInput || !this.searchResultsEl) return;

        this.searchInput.addEventListener('input', () => {
          this.runGlobalSearch(this.searchInput.value);
        });

        this.searchInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            this.openSearchResult(this.activeSearchIndex >= 0 ? this.activeSearchIndex : 0);
          } else if (e.key === 'Escape') {
            e.preventDefault();
            this.closeGlobalSearch();
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            this.moveSearchSelection(1);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            this.moveSearchSelection(-1);
          }
        });

        this.searchClose?.addEventListener('click', () => this.closeGlobalSearch());

        document.addEventListener('keydown', (e) => {
          const key = typeof e.key === 'string' ? e.key.toLowerCase() : '';
          if (e.ctrlKey && !e.metaKey && !e.altKey && key === 'x') {
            e.preventDefault();
            if (this.searchPanel.classList.contains('open')) {
              this.closeGlobalSearch();
            } else {
              this.openGlobalSearch();
            }
          } else if (e.key === 'Escape' && this.searchPanel.classList.contains('open')) {
            e.preventDefault();
            this.closeGlobalSearch();
          }
        });
      }

      openGlobalSearch() {
        this.searchPanel.classList.add('open');
        requestAnimationFrame(() => {
          this.searchInput.focus();
          this.searchInput.select();
          this.runGlobalSearch(this.searchInput.value);
        });
      }

      closeGlobalSearch() {
        if (!this.searchPanel) return;
