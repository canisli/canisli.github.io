        this.searchPanel.classList.remove('open');
        this.searchMatches = [];
        this.activeSearchIndex = -1;
        if (this.searchInput) this.searchInput.value = '';
        if (this.searchResultsEl) this.searchResultsEl.innerHTML = '';
        if (this.searchCount) this.searchCount.textContent = '';
      }

      escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      getSearchTitle(element) {
        const section = element.closest('.page-section');
        const scopedHeading = section?.querySelector('h1, h2, h3, h4');
        const previousHeading = this.headings
          .filter(h => h.element.compareDocumentPosition(element) & Node.DOCUMENT_POSITION_FOLLOWING)
          .at(-1);
        return scopedHeading?.textContent?.trim() || previousHeading?.text || this.tocTitle?.textContent?.trim() || 'Result';
      }

      getSearchTarget(node) {
        const parent = node.parentElement;
        if (!parent) return null;
        return parent.closest('p, li, .thm-box, details, figure, table, h1, h2, h3, h4') || parent;
      }

      buildSearchSnippet(text, query, index) {
        const radius = 42;
        const start = Math.max(0, index - radius);
        const end = Math.min(text.length, index + query.length + radius);
        const prefix = start > 0 ? '...' : '';
        const suffix = end < text.length ? '...' : '';
        const before = text.slice(start, index);
        const match = text.slice(index, index + query.length);
        const after = text.slice(index + query.length, end);
        return prefix
          + this.escapeHtml(before)
          + '<mark>' + this.escapeHtml(match) + '</mark>'
          + this.escapeHtml(after)
          + suffix;
      }

      runGlobalSearch(rawQuery) {
        const query = rawQuery.trim().toLowerCase();
        this.searchMatches = [];
        this.activeSearchIndex = -1;

        if (!query) {
          this.searchResultsEl.innerHTML = '';
          if (this.searchCount) this.searchCount.textContent = '';
          return;
        }

        const walker = document.createTreeWalker(
          this.content,
          NodeFilter.SHOW_TEXT,
          {
            acceptNode: (node) => {
              const parent = node.parentElement;
              if (!parent) return NodeFilter.FILTER_REJECT;
              if (parent.closest('script, style, nav, [role="doc-endnotes"], .footnote-tooltip, .footnotes-section')) {
                return NodeFilter.FILTER_REJECT;
              }
              return node.nodeValue.toLowerCase().includes(query)
                ? NodeFilter.FILTER_ACCEPT
                : NodeFilter.FILTER_REJECT;
            }
          }
        );

        while (this.searchMatches.length < 80) {
          const node = walker.nextNode();
          if (!node) break;
          const text = node.nodeValue.replace(/\s+/g, ' ');
          const index = text.toLowerCase().indexOf(query);
          const target = this.getSearchTarget(node);
          if (index < 0 || !target) continue;
          this.searchMatches.push({
            target,
            section: target.closest('.page-section'),
            title: this.getSearchTitle(target),
            snippet: this.buildSearchSnippet(text, rawQuery.trim(), index),
          });
        }

        this.renderSearchResults();
      }

      renderSearchResults() {
        if (this.searchCount) {
          this.searchCount.textContent = this.searchMatches.length
            ? String(this.searchMatches.length)
            : '0';
        }

        if (this.searchMatches.length === 0) {
          this.searchResultsEl.innerHTML = '<li class="search-empty">No matches</li>';
          return;
        }

        this.activeSearchIndex = 0;
        this.searchResultsEl.innerHTML = this.searchMatches.map((match, idx) => `
          <li class="search-result ${idx === 0 ? 'active' : ''}">
            <button type="button" data-search-index="${idx}">
              <span class="search-result-title">${this.escapeHtml(match.title)}</span>
              <span class="search-result-snippet">${match.snippet}</span>
            </button>
          </li>
        `).join('');

        this.searchResultsEl.querySelectorAll('[data-search-index]').forEach(btn => {
          btn.addEventListener('click', () => {
            this.openSearchResult(Number(btn.dataset.searchIndex));
          });
        });
      }

      moveSearchSelection(delta) {
        if (this.searchMatches.length === 0) return;
        this.activeSearchIndex = (this.activeSearchIndex + delta + this.searchMatches.length) % this.searchMatches.length;
        this.searchResultsEl.querySelectorAll('.search-result').forEach((item, idx) => {
          item.classList.toggle('active', idx === this.activeSearchIndex);
          if (idx === this.activeSearchIndex) item.scrollIntoView({ block: 'nearest' });
        });
      }

      openSearchResult(index) {
        const match = this.searchMatches[index];
        if (!match) return;
        this._pushNav();
        if (this.pageSections && match.section) {
          this.activatePageSection(match.section);
        }
        this.closeGlobalSearch();
        requestAnimationFrame(() => {
          match.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          match.target.classList.add('section-highlight');
          setTimeout(() => match.target.classList.remove('section-highlight'), 1500);
        });
      }

      setupFootnotes() {
        // Clean up previous footnotes created by a prior reinit to prevent duplicates.
        this.content.querySelectorAll('.footnote-tooltip').forEach(el => el.remove());
        this.content.querySelectorAll('details.footnotes-section').forEach(el => el.remove());

        // Find all footnote markers in the main content.
        // Note: Typst's HTML export also emits a `section[role="doc-endnotes"]` with the canonical footnote bodies.
        // We prefer that source because it correctly preserves block-level content (including block equations).
        const markers = Array.from(this.content.querySelectorAll('.footnote-marker'))
          .filter(m => !m.closest('section[role="doc-endnotes"], [role="doc-endnotes"], aside.footnotes'));
        
        if (markers.length === 0) return;

        // Map marker location id (e.g. "loc-1") -> endnote <li>
        const endnoteByLocId = new Map();
        const endnotesContainer = this.content.querySelector('section[role="doc-endnotes"], [role="doc-endnotes"], aside.footnotes');
        if (endnotesContainer) {
          endnotesContainer.querySelectorAll('li').forEach(li => {
            const backlink = li.querySelector('a[role="doc-backlink"]');
            const href = backlink?.getAttribute('href') || '';
            if (href.startsWith('#') && href.length > 1) {
              endnoteByLocId.set(href.slice(1), li);
            }
          });
        }

        const extractFootnoteHtml = (marker, fnNum) => {
          // Preferred: Typst canonical endnotes section (handles block equations safely).
          if (marker?.id && endnoteByLocId.has(marker.id)) {
            const li = endnoteByLocId.get(marker.id);
            const clone = li.cloneNode(true);
            // Remove "backlink" (the little superscript link back to the marker).
            clone.querySelectorAll('a[role="doc-backlink"]').forEach(a => a.remove());
            return clone.innerHTML;
          }

          // Fallback: preamble-generated hidden footnote content (older exports).
          const contentEl = this.content.querySelector('#fn-' + fnNum);
          return contentEl ? contentEl.innerHTML : null;
        };
        
        // Create tooltip for each marker
        markers.forEach((marker) => {
          const ref = marker.querySelector('.footnote-ref');
          if (!ref) return;
          
          // Get footnote number from the text content
          const fnNum = ref.textContent.trim();
          const html = extractFootnoteHtml(marker, fnNum);
          
          if (!html) return;

          // Create tooltip
          const tooltip = document.createElement('div');
          tooltip.className = 'footnote-tooltip';
          tooltip.innerHTML = html;
          marker.appendChild(tooltip);
        });

        if (this.pageSections && this.pageSectionEls) {
          // In paged-sections mode: create a separate footnotes section per page-section.
          // Only add the section if the page has footnotes.
          this.pageSectionEls.forEach(sec => {
            const secMarkers = Array.from(sec.querySelectorAll('.footnote-marker'))
              .filter(m => !m.closest('section[role="doc-endnotes"], [role="doc-endnotes"], aside.footnotes'));
            if (secMarkers.length === 0) return;

            const details = document.createElement('details');
            details.className = 'footnotes-section';
            details.innerHTML = '<summary>Footnotes</summary><ol></ol>';
            const ol = details.querySelector('ol');

            secMarkers.forEach(marker => {
              const ref = marker.querySelector('.footnote-ref');
              if (!ref) return;
              const fnNum = ref.textContent.trim();
              const html = extractFootnoteHtml(marker, fnNum);
              if (!html) return;

              const li = document.createElement('li');
              li.id = 'footnote-' + fnNum;
              if (!isNaN(parseInt(fnNum))) li.value = parseInt(fnNum);
              li.innerHTML = html;
              ol.appendChild(li);
            });

            sec.appendChild(details);

            // Click handler for markers in this section
            secMarkers.forEach(marker => {
              marker.style.cursor = 'pointer';
              marker.addEventListener('click', () => {
                details.setAttribute('open', '');
                const ref = marker.querySelector('.footnote-ref');
                if (!ref) return;
                const fnNum = ref.textContent.trim();
                const footnoteItem = document.getElementById('footnote-' + fnNum);
                if (footnoteItem) {
                  footnoteItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                  footnoteItem.style.background = 'var(--accent-soft)';
                  setTimeout(() => { footnoteItem.style.background = ''; }, 2000);
                }
              });
            });
          });
        } else {
          // Normal mode: single footnotes section at bottom
          markers.forEach(marker => {
            marker.style.cursor = 'pointer';
            marker.addEventListener('click', () => {
              const footnotesToggle = this.content.querySelector('details.footnotes-section');
              if (footnotesToggle) footnotesToggle.setAttribute('open', '');
              const ref = marker.querySelector('.footnote-ref');
              if (!ref) return;
              const fnNum = ref.textContent.trim();
              const footnoteItem = document.getElementById('footnote-' + fnNum);
              if (footnoteItem) {
                footnoteItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                footnoteItem.style.background = 'var(--accent-soft)';
                setTimeout(() => { footnoteItem.style.background = ''; }, 2000);
              }
            });
          });

          const section = document.createElement('details');
          section.className = 'footnotes-section';
          section.innerHTML = '<summary>Footnotes</summary><ol></ol>';
          const ol = section.querySelector('ol');

          let appendedAny = false;
          markers.forEach(marker => {
            const ref = marker.querySelector('.footnote-ref');
            if (!ref) return;
            const fnNum = ref.textContent.trim();
            const html = extractFootnoteHtml(marker, fnNum);
            if (!html) return;

            const li = document.createElement('li');
            li.id = 'footnote-' + fnNum;
            if (!isNaN(parseInt(fnNum))) li.value = parseInt(fnNum);
            li.innerHTML = html;
            ol.appendChild(li);
            appendedAny = true;
          });

          if (appendedAny) {
            this.content.appendChild(section);
          }
        }
      }

      setupToggleScrollPreservation() {
        // Prevent scroll jumps when opening <details> for the first time (content layout/images load).
        if (this._toggleScrollPreservationInstalled) return;
        this._toggleScrollPreservationInstalled = true;

        const matchesToggleDetails = (details) => {
          if (!details) return false;
          return details.matches('details.proof-box, details.toggle-box, details.footnotes-section');
        };

        const adjustToKeepAnchorFixed = (anchorEl, beforeTop, beforeScrollY) => {
          if (!anchorEl) return;
          const afterTop = anchorEl.getBoundingClientRect().top;
          const delta = afterTop - beforeTop;
          if (Math.abs(delta) > 0.5) {
            window.scrollTo(0, beforeScrollY + delta);
          }
        };

        // Use event delegation so it survives incremental content swaps.
        this.content.addEventListener('click', (e) => {
          const summary = e.target?.closest?.('summary');
          if (!summary) return;
          const details = summary.parentElement;
          if (!matchesToggleDetails(details)) return;

          // Record anchor position BEFORE the toggle happens.
          const beforeTop = summary.getBoundingClientRect().top;
          const beforeScrollY = window.scrollY;

          // After DOM updates + layout settle, adjust scroll to keep summary fixed.
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              adjustToKeepAnchorFixed(summary, beforeTop, beforeScrollY);

              // If we're opening, images inside may load later and shift layout again.
              // Keep the summary anchored as those images load.
              if (details?.open) {
                const imgs = Array.from(details.querySelectorAll('img'));
                imgs.forEach((img) => {
                  if (img.complete) return;
                  if (img.dataset.scrollAnchorBound === '1') return;
                  img.dataset.scrollAnchorBound = '1';
                  const onDone = () => adjustToKeepAnchorFixed(summary, beforeTop, beforeScrollY);
                  img.addEventListener('load', onDone, { once: true });
                  img.addEventListener('error', onDone, { once: true });
                });
              }
            });
          });
        }, true);
      }

      // ---------------------------------------------------------------------
      // Toggle persistence (proof + toggle)
      // ---------------------------------------------------------------------
      getProofStorageKey() {
        // Key by note path so different notes don't share toggle state.
        // Example: "/inference/" -> "/inference"
        const noteKey = (location.pathname || '/').replace(/\/$/, '') || '/';
        return 'typst-proof-toggle-state:' + noteKey;
      }

      loadProofToggleState() {
        try {
          const raw = localStorage.getItem(this.getProofStorageKey());
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      saveProofToggleState(state) {
        try {
          localStorage.setItem(this.getProofStorageKey(), JSON.stringify(state || {}));
        } catch (_) {
          // Ignore (storage may be unavailable)
        }
      }

      saveProofToggleStateFromDom() {
        const state = {};
        const proofBoxes = Array.from(this.content.querySelectorAll('details.proof-box:not(.toggle-box)'));
        const toggleBoxes = Array.from(this.content.querySelectorAll('details.toggle-box'));

        proofBoxes.forEach((box, idx) => { state['proof:' + String(idx)] = !!box.open; });
        toggleBoxes.forEach((box, idx) => { state['toggle:' + String(idx)] = !!box.open; });

        if (proofBoxes.length === 0 && toggleBoxes.length === 0) return;
        this.saveProofToggleState(state);
      }

      setupProofToggles() {
        const state = this.loadProofToggleState();
        const proofBoxes = Array.from(this.content.querySelectorAll('details.proof-box:not(.toggle-box)'));
        const toggleBoxes = Array.from(this.content.querySelectorAll('details.toggle-box'));
        if (proofBoxes.length === 0 && toggleBoxes.length === 0) return;

        const apply = (boxes, kind) => {
          boxes.forEach((box, idx) => {
            const key = kind + ':' + String(idx);
            box.dataset.proofIndex = key;
            if (Object.prototype.hasOwnProperty.call(state, key)) {
              if (state[key]) box.setAttribute('open', '');
              else box.removeAttribute('open');
            }
          });

          boxes.forEach((box) => {
            box.addEventListener('toggle', () => {
              const key = box.dataset.proofIndex;
              if (key == null) return;
              const next = this.loadProofToggleState();
              next[String(key)] = !!box.open;
              this.saveProofToggleState(next);
            });
          });
        };

        apply(proofBoxes, 'proof');
        apply(toggleBoxes, 'toggle');
      }

      fixQedPlacement() {
        // IMPORTANT: We must match ONLY the actual QED box glyph.
        // Earlier heuristics (holes/compound paths/etc) will incorrectly match letters like A/B/P/ℝ/ℙ.

        // Cleanup JS-added classes. Don't touch span.qed - Typst preamble sets it correctly.
        this.content.querySelectorAll('p.qed-paragraph').forEach(p => p.classList.remove('qed-paragraph'));
        this.content.querySelectorAll('p.has-qed').forEach(p => p.classList.remove('has-qed'));
        this.content.querySelectorAll('.qed-text').forEach(el => {
          // Unwrap: move children out, then remove wrapper.
          const p = el.parentElement;
          if (!p) return;
          while (el.firstChild) p.insertBefore(el.firstChild, el);
          el.remove();
        });

        // Handle text-based QED spans from Typst preamble (class="qed" with □ character)
        // If standalone in paragraph, add qed-paragraph class for right alignment
        this.content.querySelectorAll('span.qed').forEach(span => {
          if (span.querySelector('svg')) return; // Skip SVG-based, handled below
          const p = span.closest('p');
          if (!p) return;
          const meaningful = Array.from(p.childNodes).filter(n => 
            n.nodeType !== Node.TEXT_NODE || n.textContent.trim().length > 0
          );
          if (meaningful.length === 1 && meaningful[0] === span) {
            p.classList.add('qed-paragraph');
          } else {
            p.classList.add('has-qed');
          }
        });

        // Legacy: SVG-based QED detection
        // Typst HTML represents the QED box as a single-glyph SVG <use>.
        // Glyph ids vary per build, so rely on shape signature first.
        const QED_GLYPH_IDS = new Set(['g90369086EC55A1C591EB7CE746D548D4']); // legacy fallback

        const isQedPathSignature = (d) => {
          if (!d) return false;
          // General signature of Typst's hollow square:
          // - contains vertical segments around 7 units (inner square)
          // - contains horizontal segments around 7 units
          // - closes the path (Z)
          return (
            /v\s*-?7\.[0-9]+/i.test(d) &&
            /h\s*-?7\.[0-9]+/i.test(d) &&
            /v\s*7\.[0-9]+/i.test(d) &&
            /Z/i.test(d)
          );
        };

        const paragraphs = this.content.querySelectorAll('p');

        paragraphs.forEach(p => {
          const spans = p.querySelectorAll('span[style*="inline-block"]');
          if (spans.length === 0) return;

          spans.forEach(span => {
            const svg = span.querySelector('svg.typst-frame');
            if (!svg) return;

            const useElements = svg.querySelectorAll('use');
            if (useElements.length !== 1) return;

            const useEl = useElements[0];
            const href = useEl.getAttribute('xlink:href') || useEl.getAttribute('href');
            if (!href || !href.startsWith('#')) return;

            const glyphId = href.slice(1);
            let isQed = QED_GLYPH_IDS.has(glyphId);

            if (!isQed) {
              // Symbol definitions live in a shared <defs> at document level.
              const symbol = document.getElementById(glyphId) || svg.querySelector(`symbol#${glyphId}`);
              const pathEl = symbol?.querySelector('path');
              const d = pathEl?.getAttribute('d') || '';
              isQed = isQedPathSignature(d);
            }

            if (!isQed) return;

            // If this paragraph contains ONLY this QED (standalone QED paragraph), right-align the paragraph.
            const meaningfulContent = Array.from(p.childNodes).filter(node => {
              if (node.nodeType === Node.TEXT_NODE) return node.textContent.trim().length > 0;
              return true;
            });

            if (meaningfulContent.length === 1 && meaningfulContent[0] === span) {
              p.classList.add('qed-paragraph');
              span.classList.add('qed');
            } else {
              span.classList.add('qed');
              p.classList.add('has-qed');
            }
          });
        });

        // If the QED is emitted as its own paragraph, try to merge it into the
        // previous paragraph so it appears on the same final line.
        // (This commonly happens because `h(1fr)` is ignored in HTML export.)
        Array.from(this.content.querySelectorAll('p.qed-paragraph')).forEach(p => {
          const qedSpan = p.querySelector('span.qed');
          if (!qedSpan) return;

          const prev = p.previousElementSibling;
          if (!prev || prev.tagName !== 'P') return;
          if (prev.querySelector('span.qed')) return; // already has one

          prev.appendChild(document.createTextNode(' '));
          prev.appendChild(qedSpan);
          prev.classList.add('has-qed');
          p.remove();
        });

        // Wrap paragraph content so flex layout only has two children:
        // `.qed-text` (all text/content) and `span.qed` (the box).
        // Avoid `:scope` selectors for broader browser compatibility.
        Array.from(this.content.querySelectorAll('p.has-qed')).forEach(p => {
          const hasWrapper = Array.from(p.children).some(ch => ch.classList?.contains('qed-text'));
          if (hasWrapper) return;

          let qedEl = Array.from(p.children).find(
            ch => ch.tagName === 'SPAN' && ch.classList.contains('qed'),
          );
          if (!qedEl) {
            // Try to hoist nested QED to be a direct child.
            const nested = p.querySelector('span.qed');
            if (!nested) return;
            qedEl = nested;
            p.appendChild(qedEl);
          }

          const wrap = document.createElement('span');
          wrap.className = 'qed-text';

          // Move everything except the QED into the wrapper.
          while (p.firstChild && p.firstChild !== qedEl) {
            wrap.appendChild(p.firstChild);
          }
          p.insertBefore(wrap, qedEl);
        });
      }

      fixInlineMathBaseline() {
        // Typst's inline math SVGs always have height ≥ the standard text
        // ascent (the frame height when there's no descent). Content above
        // the standard ascent overflows via overflow:visible; content below
        // the baseline extends the viewBox (and CSS height). So:
        //   descent = height - standard_ascent
        // The standard ascent is the minimum height across all inline SVGs.
        const svgs = [];
        this.content.querySelectorAll('svg.typst-frame').forEach(svg => {
          if (svg.closest('.block-math')) return;
          const p = svg.parentElement;
          if (p?.matches?.('p') && p.children.length === 1 && p.childNodes.length === 1) return;
          const h = parseFloat(svg.style.height);
          if (h > 0) svgs.push({ el: svg, h });
        });
        if (svgs.length === 0) return;

        const standardAscent = Math.min(...svgs.map(s => s.h));

        for (const { el, h } of svgs) {
          const descent = h - standardAscent;
          if (descent < 0.001) continue;
          el.style.verticalAlign = `${-descent}em`;
        }
      }

      fixTallInlineMath() {
        this.content.querySelectorAll('span[style*="inline-block"]').forEach(span => {
          const svg = span.querySelector('svg.typst-frame');
          if (!svg || span.closest('.block-math')) return;

          try {
            const bbox = svg.getBBox();
            const vb = svg.viewBox.baseVal;
            if (!vb || vb.height === 0) return;

            const cssHeight = svg.getBoundingClientRect().height;
            const scale = cssHeight / vb.height;

            const overTop = Math.max(0, vb.y - bbox.y) * scale;
            const overBot = Math.max(0, (bbox.y + bbox.height) - (vb.y + vb.height)) * scale;

            if (overTop > 10) {
              span.style.marginTop = `${overTop + 5}px`;
            }
            if (overBot > 10) {
              span.style.marginBottom = `${overBot + 5}px`;
            }
          } catch(e) {}
        });
      }

      fixSectionLinks() {
        // Fix internal reference links (sections, equations, figures)
        // Adds smooth scrolling and highlight effects
        
        const links = this.content.querySelectorAll('a[href^="#"]:not([data-link-fixed])');
        
        links.forEach(link => {
          link.setAttribute('data-link-fixed', '');
          const href = link.getAttribute('href');
          const targetId = href.slice(1); // Remove # prefix
          const linkText = link.textContent.trim();
          
          // Check what type of reference this is
          const sectionMatch = linkText.match(/^Section\s+([\d.]+)$/);
          const equationMatch = linkText.match(/^Equation\s+([\d.]+)$/);
          const figureMatch = linkText.match(/^Figure\s+(\d+)$/);
          const thmMatch = linkText.match(/^(Theorem|Lemma|Proposition|Corollary|Definition|Example|Idea)\s+([\d.]+)$/);
          
          if (thmMatch) {
            link.addEventListener('click', (e) => {
              e.preventDefault();
              const target = document.getElementById(targetId);
              if (target) {
                this._pushNav();
                if (this.pageSections) {
                  const parentSection = target.closest('.page-section');
                  if (parentSection) this.activatePageSection(parentSection);
                }
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                target.style.background = 'var(--accent-soft)';
                setTimeout(() => { target.style.background = ''; }, 2000);
              }
            });
          } else if (sectionMatch) {
            const sectionNum = sectionMatch[1];
            
            // Find the heading with this section number
            link.addEventListener('click', (e) => {
              e.preventDefault();
              this._pushNav();
              
              // Look for heading that starts with this number
              const headings = this.content.querySelectorAll('h1, h2, h3, h4');
              for (const heading of headings) {
                const text = heading.textContent.trim();
                // Match "1.2. Title" or "1.2 Title" patterns
                if (text.startsWith(sectionNum + '.') || text.startsWith(sectionNum + ' ')) {
                  // In paged-sections mode, reveal the parent section first
                  if (this.pageSections) {
                    const parentSection = heading.closest('.page-section');
                    if (parentSection) this.activatePageSection(parentSection);
                  }
                  heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                  heading.style.background = 'var(--accent-soft)';
                  setTimeout(() => { heading.style.background = ''; }, 2000);
                  return;
                }
              }
              
              // Fallback: try to find by the original href
              const target = document.getElementById(targetId);
              if (target) {
                if (this.pageSections) {
                  const parentSection = target.closest('.page-section');
                  if (parentSection) this.activatePageSection(parentSection);
                }
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
            });
          } else if (equationMatch || figureMatch) {
            // Equation and figure links - smooth scroll to target with highlight
            link.addEventListener('click', (e) => {
              e.preventDefault();
              const target = document.getElementById(targetId);
              if (target) {
                this._pushNav();
                if (this.pageSections) {
                  const parentSection = target.closest('.page-section');
                  if (parentSection) this.activatePageSection(parentSection);
                }
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.style.background = 'var(--accent-soft)';
                setTimeout(() => { target.style.background = ''; }, 2000);
              }
            });
          }
        });
      }

      _captureNavState() {
        return {
          scrollY: window.scrollY,
          sectionIdx: (this.pageSections && this.pageSectionEls)
            ? this.pageSectionEls.findIndex(s => s.classList.contains('active'))
            : -1
        };
      }

      _restoreNavState(state) {
        if (this.pageSections && this.pageSectionEls && state.sectionIdx >= 0 && state.sectionIdx < this.pageSectionEls.length) {
          this.activatePageSection(this.pageSectionEls[state.sectionIdx]);
        }
        window.scrollTo({ top: state.scrollY, behavior: 'smooth' });
      }

      _pushNav() {
        this._navBackStack.push(this._captureNavState());
        this._navForwardStack = [];
      }

      _navBack() {
        if (this._navBackStack.length === 0) return;
        this._navForwardStack.push(this._captureNavState());
        this._restoreNavState(this._navBackStack.pop());
      }

      _navForward() {
        if (this._navForwardStack.length === 0) return;
        this._navBackStack.push(this._captureNavState());
        this._restoreNavState(this._navForwardStack.pop());
      }

      setupNavHistory() {
        document.addEventListener('keydown', (e) => {
          if (this.searchPanel?.classList.contains('open')) {
            if (e.ctrlKey && !e.metaKey && (e.key === '[' || e.key === ']')) e.preventDefault();
            return;
          }
          if (e.ctrlKey && !e.metaKey && e.key === '[') {
            e.preventDefault();
            this._navBack();
          } else if (e.ctrlKey && !e.metaKey && e.key === ']') {
            e.preventDefault();
            this._navForward();
          }
        });
      }

      setupPageSections() {
        // If section wrappers already exist (incremental update), reuse them.
        const existingSections = Array.from(this.content.querySelectorAll(':scope > .page-section'));
        if (existingSections.length > 0) {
          this.pageSections = true;
          this.pageSectionEls = existingSections;
          if (this.headings.length > 0) {
            this.pageSectionLevel = Math.min(...this.headings.map(h => h.level));
          }
          // Re-attach TOC handlers (buildToc recreated the TOC links)
          this._attachPageSectionTocHandlers();
          return;
        }

        // Check for the marker element emitted by Typst when page-sections is enabled
        const flag = this.content.querySelector('#page-sections-flag');
        if (!flag) {
          this.pageSections = false;
          return;
        }
        this.pageSections = true;
        flag.remove();

        // Typst maps heading levels with an offset (= becomes <h2>, == becomes <h3>, etc.)
        // Detect the actual minimum heading tag level in the content to use as section boundaries.
        if (this.headings.length === 0) return;
        const minLevel = Math.min(...this.headings.map(h => h.level));
        this.pageSectionLevel = minLevel;
        const sectionTagName = 'H' + minLevel;

        // Group DOM children of the content element into <section class="page-section"> wrappers.
        // Each top-level heading starts a new section. Content before the first one is a preamble.
        const children = Array.from(this.content.childNodes);
        let currentSection = document.createElement('section');
        currentSection.className = 'page-section';
        currentSection.dataset.sectionIdx = '0';
        const sections = [currentSection];
        let sectionIdx = 0;

        children.forEach(node => {
          const isSectionHeading = node.nodeType === Node.ELEMENT_NODE && node.tagName === sectionTagName;
          if (isSectionHeading) {
            sectionIdx++;
            currentSection = document.createElement('section');
            currentSection.className = 'page-section';
            currentSection.dataset.sectionIdx = String(sectionIdx);
            sections.push(currentSection);
          }
          currentSection.appendChild(node);
        });

        // Append all section wrappers back into the content element
        sections.forEach(sec => this.content.appendChild(sec));
        this.pageSectionEls = sections;

        // Determine which section to show initially (from URL hash or default).
        // Skip an empty preamble section (no heading, only whitespace).
        let initialSection = sections[0];
        const preambleHasContent = sections[0].querySelector(sectionTagName) ||
          sections[0].textContent.trim().length > 0;
        if (!preambleHasContent && sections.length > 1) {
          initialSection = sections[1];
        }

        const hash = location.hash.slice(1);
        if (hash) {
          const hashTarget = document.getElementById(hash);
          if (hashTarget) {
            const parentSec = hashTarget.closest('.page-section');
            if (parentSec) initialSection = parentSec;
          }
        }
        this.activatePageSection(initialSection);

        // Attach TOC click handlers and hashchange listener
        this._attachPageSectionTocHandlers();

        // Handle browser back/forward via hashchange (only once)
        if (!this._hashChangeAttached) {
          this._hashChangeAttached = true;
          window.addEventListener('hashchange', () => {
            const id = location.hash.slice(1);
            if (!id) return;
            const target = document.getElementById(id);
            if (!target) return;
            const parentSection = target.closest('.page-section');
            if (parentSection) {
              this.activatePageSection(parentSection);
              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          });
        }
      }

      _attachPageSectionTocHandlers() {
        const minLevel = this.pageSectionLevel || 2;
        this.tocList.querySelectorAll('.toc-link').forEach(link => {
          // Clone+replace to strip old click listeners from buildToc
          const newLink = link.cloneNode(true);
          link.parentNode.replaceChild(newLink, link);

          newLink.addEventListener('click', (e) => {
            e.preventDefault();
            const id = newLink.dataset.id;
            const level = parseInt(newLink.dataset.level);
            const target = document.getElementById(id);
            if (!target) return;

            const parentSection = target.closest('.page-section');
            if (!parentSection) return;

            if (level === minLevel) {
              this.activatePageSection(parentSection);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
              this.activatePageSection(parentSection);
              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            this.closeMobileToc();
          });
        });
      }

      activatePageSection(section) {
        if (!this.pageSectionEls) return;
        this.pageSectionEls.forEach(sec => sec.classList.remove('active'));
        section.classList.add('active');

        // Find the section's top-level heading for deep-linking and TOC highlighting
        const tagName = this.pageSectionLevel ? 'h' + this.pageSectionLevel : 'h2';
        const heading = section.querySelector(tagName);
        if (heading && heading.id) {
          history.replaceState(null, '', '#' + heading.id);
          this.setActiveLink(heading.id);
        }
      }
    }

    // Initialize when DOM is ready
    function initializeReader() {
      window.typstReader = new TypstReader();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeReader);
    } else {
      // DOM is already loaded
      initializeReader();
    }

    // Fallback: show TOC list after 500ms even if initialization fails
    setTimeout(() => {
      const tocList = document.getElementById('toc-list');
      if (tocList && !tocList.classList.contains('ready')) {
        tocList.classList.add('ready');
      }
    }, 500);

    // Manual refresh support (Ctrl+R = incremental, Cmd+R = full reload)
    (function() {
      let isUpdating = false;
      let cachedManifest = null;
      let sectionWrappers = null;

      // Pre-cache manifest on page load so the first Ctrl+R can diff
      // instead of falling back to the slow full-rebuild path.
      {
        const notePath = location.pathname.replace(/\/$/, '');
        fetch(notePath + '/content.manifest.json?t=' + Date.now())
          .then(r => r.ok ? r.json() : null)
          .then(m => {
            if (!m) return;
            cachedManifest = m;
            // Ensure header metadata is corrected on initial page load too.
            applyManifestMeta(m);
          })
          .catch(() => {});
      }

      function reinitReader() {
        const contentEl = document.getElementById('typst-content');
        if (!contentEl) return;
        const headingElements = contentEl.querySelectorAll('h1.numbered-heading, h2.numbered-heading, h3.numbered-heading, h4.numbered-heading');
        const counters = [0, 0, 0, 0];
        headingElements.forEach((el) => {
          if (el.querySelector('.heading-number')) return;
          const dataLevel = el.getAttribute('data-level');
          const level = dataLevel ? parseInt(dataLevel) : parseInt(el.tagName[1]);
          const text = el.textContent.trim();
          if (text.match(/^([\d.]+)\s*/)) return;
          const levelIdx = level - 1;
          counters[levelIdx]++;
          for (let i = levelIdx + 1; i < counters.length; i++) counters[i] = 0;
          const number = counters.slice(0, level).filter(n => n > 0).join('.');
          if (number) el.innerHTML = '<span class="heading-number">' + number + '.</span> ' + el.innerHTML;
        });
        if (window.typstReader) {
          window.typstReader.headings = [];
          window.typstReader.extractHeadings();
          window.typstReader.buildToc();
          window.typstReader.setupPageSections();
          window.typstReader.setupScrollspy();
          if (window.typstReader.sectionJump?.classList.contains('open')) {
            window.typstReader.updateSectionJumpMatches();
          }
          window.typstReader.setupCodeBlockCopyButtons();
          window.typstReader.setupFootnotes();
          window.typstReader.setupProofToggles();
          window.typstReader.setupToggleScrollPreservation();
          window.typstReader.fixQedPlacement();
          window.typstReader.fixInlineMathBaseline();
          window.typstReader.fixTallInlineMath();
          window.typstReader.fixSectionLinks();
        }
      }

      async function fetchSection(notePath, idx) {
        const r = await fetch(notePath + '/sections/' + idx + '.html?t=' + Date.now());
        if (!r.ok) throw new Error('Failed to fetch section ' + idx);
        return r.text();
      }

      function flashContentIndicator(reader, activeIdx) {
        let flashEl = null;
        if (reader && reader.pageSections && reader.pageSectionEls) {
          flashEl = reader.pageSectionEls[activeIdx >= 0 ? activeIdx : 0];
        } else {
          flashEl = document.getElementById('typst-content');
        }
        if (flashEl) {
          flashEl.style.transition = 'opacity 0.15s ease';
          flashEl.style.opacity = '0.7';
          setTimeout(() => { flashEl.style.opacity = '1'; }, 150);
        }
      }

      // Build section wrapper DOM elements from fetched HTML parts.
      // In paged mode, creates <section class="page-section"> so setupPageSections detects them.
      // In non-paged mode, creates plain <div> wrappers for surgical replacement.
      function buildSectionWrappers(contentEl, parts) {
        const willBePaged = parts[0] && parts[0].includes('id="page-sections-flag"');
        contentEl.innerHTML = '';
        sectionWrappers = parts.map((html, i) => {
          const el = willBePaged
            ? document.createElement('section')
            : document.createElement('div');
          if (willBePaged) {
            el.className = 'page-section';
          }
          el.dataset.sectionIdx = String(i);
          el.innerHTML = html;
          contentEl.appendChild(el);
          return el;
        });
      }

      function getManifestMeta(manifest) {
        if (!manifest || typeof manifest !== 'object') return null;
        const meta = manifest.meta;
        if (!meta || typeof meta !== 'object') return null;
        return {
          title: typeof meta.title === 'string' ? meta.title : '',
          course: typeof meta.course === 'string' ? meta.course : '',
          term: typeof meta.term === 'string' ? meta.term : '',
          instructor: typeof meta.instructor === 'string' ? meta.instructor : '',
        };
      }

      function metaChanged(prevManifest, nextManifest) {
        const prev = getManifestMeta(prevManifest);
        const next = getManifestMeta(nextManifest);
        if (!prev && !next) return false;
        if (!prev || !next) return true;
        return (
          prev.title !== next.title ||
          prev.course !== next.course ||
          prev.term !== next.term ||
          prev.instructor !== next.instructor
        );
      }

      function applyManifestMeta(manifest) {
        const meta = getManifestMeta(manifest);
        if (!meta) return;

        // Keep title and header metadata in sync during incremental refresh.
        if (meta.title) document.title = meta.title;

        const courseEl = document.getElementById('toc-title');
        const termEl = document.querySelector('.toc-term');
        const instructorEl = document.querySelector('.toc-instructor');

        if (courseEl) courseEl.textContent = meta.course || '';
        if (termEl) termEl.textContent = meta.term || '';
        if (instructorEl) instructorEl.textContent = meta.instructor || '';
      }

      async function incrementalUpdate() {
        if (isUpdating) return;
        isUpdating = true;
        console.time('[Ctrl+R] total');

        try {
          const notePath = location.pathname.replace(/\/$/, '');
          const reader = window.typstReader;

          // Save state
          const scrollY = window.scrollY;
          const activeIdx = (reader && reader.pageSections && reader.pageSectionEls)
            ? reader.pageSectionEls.findIndex(s => s.classList.contains('active'))
            : -1;
          if (reader && reader.saveProofToggleStateFromDom) {
            reader.saveProofToggleStateFromDom();
          }

          // Fetch manifest
          console.time('[Ctrl+R] fetch manifest');
          const res = await fetch(notePath + '/content.manifest.json?t=' + Date.now());
          if (!res.ok) throw new Error('No manifest');
          const manifest = await res.json();
          console.timeEnd('[Ctrl+R] fetch manifest');
          const didMetaChange = metaChanged(cachedManifest, manifest);
          if (didMetaChange) applyManifestMeta(manifest);

          // Determine which sections changed
          const changed = [];
          for (let i = 0; i < manifest.sections.length; i++) {
            if (!cachedManifest || !cachedManifest.sections[i] ||
                cachedManifest.sections[i].hash !== manifest.sections[i].hash) {
              changed.push(i);
            }
          }

          // Nothing changed at all
          if (changed.length === 0 && !didMetaChange && cachedManifest &&
              manifest.sections.length === cachedManifest.sections.length) {
            console.log('[Ctrl+R] no changes detected');
            console.timeEnd('[Ctrl+R] total');
            cachedManifest = manifest;
            flashContentIndicator(reader, activeIdx);
            return;
          }

          // Check if we can do surgical section replacement
          const sameStructure = cachedManifest &&
            manifest.sections.length === cachedManifest.sections.length &&
            sectionWrappers &&
            sectionWrappers.length === manifest.sections.length;

          console.log('[Ctrl+R] changed sections:', changed.length, '/', manifest.sections.length,
            sameStructure ? '(fast path)' : '(rebuild path)');

          // Disable scroll anchoring during DOM mutations
          document.documentElement.style.overflowAnchor = 'none';

          if (sameStructure) {
            // ── Fast path: replace only changed sections in-place ──
            console.time('[Ctrl+R] fetch changed sections');
            const fetched = await Promise.all(
              changed.map(idx => fetchSection(notePath, idx))
            );
            console.timeEnd('[Ctrl+R] fetch changed sections');

            console.time('[Ctrl+R] DOM update + reinit');
            for (let i = 0; i < changed.length; i++) {
              sectionWrappers[changed[i]].innerHTML = fetched[i];
            }
            reinitReader();
            console.timeEnd('[Ctrl+R] DOM update + reinit');

            // Restore active page section (skip if already correct)
            if (reader && reader.pageSections && reader.pageSectionEls &&
                activeIdx >= 0 && activeIdx < reader.pageSectionEls.length) {
              if (!reader.pageSectionEls[activeIdx].classList.contains('active')) {
                reader.activatePageSection(reader.pageSectionEls[activeIdx]);
              }
            }
          } else {
            // ── Rebuild: create section wrappers from fetched parts ──
            const contentEl = document.getElementById('typst-content');
            if (!contentEl) throw new Error('No content element');

            console.time('[Ctrl+R] fetch all sections');
            const parts = await Promise.all(
              manifest.sections.map((_, i) => fetchSection(notePath, i))
            );
            console.timeEnd('[Ctrl+R] fetch all sections');

            console.time('[Ctrl+R] DOM rebuild + reinit');
            if (reader) {
              reader.pageSections = false;
              reader.pageSectionEls = null;
            }
            buildSectionWrappers(contentEl, parts);
            reinitReader();
            console.timeEnd('[Ctrl+R] DOM rebuild + reinit');

            // Restore active page section
            if (reader && reader.pageSections && reader.pageSectionEls &&
                activeIdx >= 0 && activeIdx < reader.pageSectionEls.length) {
              reader.activatePageSection(reader.pageSectionEls[activeIdx]);
            }
          }

          // Pin scroll synchronously, then re-enable anchoring + flash after paint
          window.scrollTo(0, scrollY);
          requestAnimationFrame(() => {
            window.scrollTo(0, scrollY);
            document.documentElement.style.overflowAnchor = '';
            flashContentIndicator(reader, activeIdx);
          });

          cachedManifest = manifest;
          console.timeEnd('[Ctrl+R] total');
        } catch (err) {
          console.warn('Incremental update failed:', err);
          console.timeEnd('[Ctrl+R] total');
        } finally {
          isUpdating = false;
        }
      }

      window.incrementalUpdate = incrementalUpdate;

      document.addEventListener('keydown', async (e) => {
        if (e.ctrlKey && !e.metaKey && e.key === 'r') {
          e.preventDefault();
          try { await incrementalUpdate(); } catch (e) {}
        }
      });
    })();

  </script>
</body>
</html>
